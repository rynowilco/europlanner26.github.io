                                            <h3 style={{ fontSize: '0.8rem', fontWeight: 700, color: 'var(--color-text-light)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: 'var(--space-sm)' }}>
                                                To Book ({bookingItems.filter(b => b.status !== 'booked').length})
                                            </h3>
                                            {bookingItems.filter(b => b.status !== 'booked').map(item => (
                                                <div key={item.id} style={{ background: 'white', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', marginBottom: 'var(--space-sm)', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--color-border)', borderLeft: '4px solid var(--color-terracotta)' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 'var(--space-sm)' }}>
                                                        <div style={{ flex: 1 }}>
                                                            <div style={{ fontWeight: 600, fontSize: '1rem', marginBottom: '2px' }}>{item.title}</div>
                                                            {item.city && <div style={{ fontSize: '0.8rem', color: 'var(--color-text-light)', marginBottom: 'var(--space-xs)' }}>📍 {item.city}</div>}
                                                            {item.notes && <div style={{ fontSize: '0.85rem', color: 'var(--color-text)', lineHeight: 1.4, marginBottom: 'var(--space-xs)' }}>{item.notes}</div>}
                                                            {item.link && (
                                                                <a href={item.link} target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.85rem', color: 'var(--color-navy)', fontWeight: 500, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '4px' }}>
                                                                    🔗 Book now
                                                                </a>
                                                            )}
                                                        </div>
                                                        <div style={{ display: 'flex', gap: 'var(--space-xs)', flexShrink: 0 }}>
                                                            <button onClick={() => onToggleBooked(item.id)} style={{ padding: '6px 12px', background: 'var(--color-success)', color: 'white', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 600, whiteSpace: 'nowrap' }}>
                                                                ✓ Done
                                                            </button>
                                                            <button onClick={() => onDeleteBooking(item.id)} style={{ padding: '6px', background: 'none', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', color: 'var(--color-text-light)' }}>
                                                                <Icon name="X" size={14} />
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Booked section */}
                                    {bookingItems.filter(b => b.status === 'booked').length > 0 && (
                                        <div>
                                            <h3 style={{ fontSize: '0.8rem', fontWeight: 700, color: 'var(--color-text-light)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: 'var(--space-sm)' }}>
                                                Booked ✓ ({bookingItems.filter(b => b.status === 'booked').length})
                                            </h3>
                                            {bookingItems.filter(b => b.status === 'booked').map(item => (
                                                <div key={item.id} style={{ background: '#F1F8F1', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', marginBottom: 'var(--space-sm)', border: '1px solid #C8E6C9', borderLeft: '4px solid var(--color-success)', opacity: 0.8 }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 'var(--space-sm)' }}>
                                                        <div style={{ flex: 1 }}>
                                                            <div style={{ fontWeight: 600, fontSize: '0.95rem', textDecoration: 'line-through', color: 'var(--color-text-light)' }}>{item.title}</div>
                                                            {item.city && <div style={{ fontSize: '0.8rem', color: 'var(--color-text-light)' }}>📍 {item.city} · booked {item.dateBooked}</div>}
                                                        </div>
                                                        <button onClick={() => onToggleBooked(item.id)} style={{ padding: '4px 10px', background: 'none', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontSize: '0.75rem', color: 'var(--color-text-light)', whiteSpace: 'nowrap' }}>
                                                            Undo
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    )}

                    {isAdmin && (
                        <footer style={{ padding: 'var(--space-md)', paddingBottom: 'calc(var(--space-md) + env(safe-area-inset-bottom, 0px))', borderTop: '1px solid var(--color-border)', background: 'white', textAlign: 'center', flexShrink: 0 }}>
                            <button onClick={handleResetCache} style={{ background: 'none', border: 'none', color: 'var(--color-text-light)', fontSize: '0.85rem', cursor: 'pointer', padding: 'var(--space-sm) var(--space-md)' }}>
                                Reset cached data
                            </button>
                        </footer>
                    )}
                </div>
            );
        };
        
        // Map Screen with Leaflet
        const MapScreen = ({ onBack, activities, userProfiles, itinerary }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const [selectedCity, setSelectedCity] = useState(null);
            
            const tripItinerary = itinerary || CONFIG.itinerary;
            
            useEffect(() => {
                if (!mapRef.current || mapInstanceRef.current) return;

                // Initialize with a neutral center — fitBounds will override immediately
                const map = L.map(mapRef.current, {
                    center: [46, 10],
                    zoom: 5,
                    zoomControl: false
                });

                // Move zoom controls to bottom-right for cleaner mobile layout
                L.control.zoom({ position: 'bottomright' }).addTo(map);

                // CartoDB Positron — clean, minimal, free
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(map);

                // Auto-fit bounds to itinerary destinations (exclude transfer days from bounds calc)
                const mainCities = tripItinerary.filter(c => !c.isTransfer);
                if (mainCities.length > 1) {
                    const bounds = L.latLngBounds(mainCities.map(c => [c.lat, c.lng]));
                    map.fitBounds(bounds, { padding: [48, 48] });
                }

                // Red dashed route polyline connecting all stops in order
                const routeCoords = tripItinerary.map(c => [c.lat, c.lng]);
                L.polyline(routeCoords, {
                    color: '#E53935',
                    weight: 2.5,
                    dashArray: '8, 8',
                    opacity: 0.65
                }).addTo(map);

                const createIcon = (isTransfer = false) => L.divIcon({
                    className: 'custom-marker',
                    html: isTransfer
                        ? '<div style="background: var(--color-gold); width: 26px; height: 26px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; font-size: 13px;">🚂</div>'
                        : '<div style="background: var(--color-terracotta); width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.25);"></div>',
                    iconSize: isTransfer ? [26, 26] : [30, 30],
                    iconAnchor: isTransfer ? [13, 13] : [15, 30],
                    popupAnchor: [0, -32]
                });

                tripItinerary.forEach((city) => {
                    const isTransfer = city.isTransfer || city.city.toLowerCase().includes('transfer') || city.city.toLowerCase().includes('kids choice');

                    const marker = L.marker([city.lat, city.lng], {
                        icon: createIcon(isTransfer)
                    }).addTo(map);

                    marker.on('click', () => {
                        setSelectedCity(city);
                        map.flyTo([city.lat, city.lng], 12, { duration: 0.4 });
                    });

                    // City name label
                    const label = L.divIcon({
                        className: 'city-label-container',
                        html: '<div style="background: ' + (isTransfer ? 'var(--color-gold)' : 'white') + '; color: ' + (isTransfer ? 'white' : 'var(--color-text)') + '; padding: 3px 7px; border-radius: 4px; font-size: ' + (isTransfer ? '10px' : '11px') + '; font-weight: 600; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,0.18); display: inline-block;">' + city.city + '</div>',
                        iconAnchor: [-18, 14]
                    });
                    L.marker([city.lat, city.lng], { icon: label, interactive: false }).addTo(map);
                });

                // Small dots for approved activities
                activities.filter(a => !a.isSample && a.status === 'approved').forEach(activity => {
                    const cityInfo = tripItinerary.find(c => c.city === activity.city);
                    if (cityInfo) {
                        const dot = L.divIcon({
                            className: 'activity-marker',
                            html: '<div style="background: var(--color-success); width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.2);"></div>',
                            iconSize: [10, 10],
                            iconAnchor: [5, 5]
                        });
                        const offset = 0.018;
                        L.marker([cityInfo.lat + offset, cityInfo.lng + offset], { icon: dot })
                            .bindPopup('<strong>' + activity.title + '</strong><br/>' + activity.kidName)
                            .addTo(map);
                    }
                });

                mapInstanceRef.current = map;

                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, [activities]);
            
            // Fuzzy city match: catches "Basel (Transfer Day)", "Near Florence", etc.
            // Checks if either string contains the other (case-insensitive)
            const cityMatchesSafe = (activityCity, markerCity) => {
                if (!activityCity || !markerCity) return false;
                const a = activityCity.toLowerCase();
                const b = markerCity.toLowerCase();
                return a === b || a.includes(b) || b.includes(a);
            };
            const cityActivities = selectedCity ? activities.filter(a => cityMatchesSafe(a.city, selectedCity.city) && !a.isSample) : [];
            const phrases = selectedCity ? CONFIG.phrases[selectedCity.language] || [] : [];
            
            return (
                <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--color-cream)' }}>
                    <header style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-sm)', padding: 'var(--space-md)', paddingTop: 'calc(var(--space-md) + env(safe-area-inset-top, 0px))', background: 'white', borderBottom: '1px solid var(--color-border)', zIndex: 1000 }}>
                        <button onClick={onBack} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}>
                            <Icon name="ArrowLeft" size={20} />
                        </button>
                        <h1 style={{ flex: 1, fontSize: '1.25rem', fontWeight: 600 }}>Trip Map</h1>
                        <Icon name="Globe" size={24} color="var(--color-navy)" />
                    </header>
                    
                    <div style={{ flex: 1, position: 'relative' }}>
                        <div ref={mapRef} style={{ height: '100%', width: '100%' }} />
                        
                        {/* City Detail Panel */}
                        {selectedCity && (
                            <div style={{
                                position: 'absolute',
                                bottom: 0,
                                left: 0,
                                right: 0,
                                background: 'white',
                                borderRadius: 'var(--radius-lg) var(--radius-lg) 0 0',
                                boxShadow: '0 -4px 20px rgba(0,0,0,0.15)',
                                maxHeight: '60%',
                                overflow: 'hidden',
                                display: 'flex',
                                flexDirection: 'column',
                                animation: 'slideUp 0.3s ease-out',
                                zIndex: 1000
                            }}>
                                <div style={{ padding: 'var(--space-sm)', display: 'flex', justifyContent: 'center' }}>
                                    <div style={{ width: '40px', height: '4px', background: 'var(--color-tan)', borderRadius: '2px' }} />
                                </div>
                                
                                <div style={{ padding: '0 var(--space-md) var(--space-md)', borderBottom: '1px solid var(--color-border)' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                        <div>
                                            <h2 style={{ fontSize: '1.5rem', fontWeight: 600, fontFamily: 'var(--font-display)' }}>{selectedCity.city}</h2>
                                            <p style={{ color: 'var(--color-text-light)', fontSize: '0.9rem' }}>
                                                {selectedCity.country} · {selectedCity.startDate} to {selectedCity.endDate}
                                            </p>
                                            <p style={{ color: 'var(--color-text-light)', fontSize: '0.85rem', marginTop: '4px' }}>
                                                🚗 {selectedCity.transport}
                                            </p>
                                        </div>
                                        <button onClick={() => setSelectedCity(null)} style={{ background: 'none', border: 'none', padding: '8px', cursor: 'pointer' }}>
                                            <Icon name="X" size={20} color="var(--color-text-light)" />
                                        </button>
                                    </div>
                                </div>
                                
                                <div style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-md)' }}>
                                    {cityActivities.length > 0 && (
                                        <div style={{ marginBottom: 'var(--space-lg)' }}>
                                            <h3 style={{ fontSize: '0.9rem', fontWeight: 600, color: 'var(--color-text-light)', marginBottom: 'var(--space-sm)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                                                Planned Activities
                                            </h3>
                                            {cityActivities.map(a => {
                                                const userProfile = userProfiles[a.kidId];
                                                const statusColor = a.status === 'approved' ? '#E8F5E9' : a.status === 'submitted' ? '#FFF3E0' : 'var(--color-cream)';
                                                const statusLabel = a.status === 'approved' ? 'approved' : a.status === 'submitted' ? 'pending' : a.status;
                                                const statusTextColor = a.status === 'approved' ? 'var(--color-success)' : a.status === 'submitted' ? 'var(--color-warning)' : 'var(--color-text-light)';
                                                return (
                                                    <div key={a.id} style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-sm)', padding: 'var(--space-sm) var(--space-md)', background: statusColor, borderRadius: 'var(--radius-sm)', marginBottom: 'var(--space-xs)', border: '1px solid rgba(0,0,0,0.05)' }}>
                                                        <span style={{ fontSize: '1rem' }}>{userProfile?.emoji || '👤'}</span>
                                                        <span style={{ fontSize: '0.9rem', flex: 1, fontWeight: 500 }}>{a.title}</span>
                                                        <span style={{ fontSize: '0.75rem', fontWeight: 600, color: statusTextColor, background: 'rgba(255,255,255,0.7)', padding: '2px 6px', borderRadius: 'var(--radius-full)' }}>{statusLabel}</span>
                                                        {a.estimatedCost > 0 && <span style={{ fontSize: '0.75rem', color: 'var(--color-text-light)' }}>€{a.estimatedCost}</span>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                    
                                    <div>
                                        <h3 style={{ fontSize: '0.9rem', fontWeight: 600, color: 'var(--color-text-light)', marginBottom: 'var(--space-sm)', textTransform: 'uppercase', letterSpacing: '0.5px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                            <Icon name="Globe" size={14} /> {selectedCity.language} Phrases
                                        </h3>
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-sm)' }}>
                                            {phrases.map((phrase, i) => (
                                                <div key={i} style={{ background: 'var(--color-cream)', borderRadius: 'var(--radius-sm)', padding: 'var(--space-md)' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '4px' }}>
                                                        <span style={{ fontWeight: 600, color: 'var(--color-navy)' }}>{phrase.local}</span>
                                                        <span style={{ fontSize: '0.8rem', color: 'var(--color-text-light)' }}>{phrase.english}</span>
                                                    </div>
                                                    <div style={{ fontSize: '0.85rem', color: 'var(--color-terracotta)', fontStyle: 'italic' }}>
                                                        {phrase.pronunciation}
                                                    </div>
                                                    <div style={{ fontSize: '0.8rem', color: 'var(--color-text-light)', marginTop: '4px' }}>
                                                        💡 {phrase.when}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {!selectedCity && (
                            <div style={{
                                position: 'absolute',
                                bottom: 'var(--space-lg)',
                                left: '50%',
                                transform: 'translateX(-50%)',
                                background: 'white',
                                padding: 'var(--space-sm) var(--space-md)',
                                borderRadius: 'var(--radius-full)',
                                boxShadow: 'var(--shadow-md)',
                                fontSize: '0.9rem',
                                color: 'var(--color-text-light)',
                                whiteSpace: 'nowrap',
                                zIndex: 1000
                            }}>
                                👆 Tap a city to see details & phrases
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        // Password Modal
        const PasswordModal = ({ onSuccess, onCancel }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);
            
            const checkPassword = () => {
                if (password === CONFIG.adminPassword) {
                    onSuccess();
                } else {
                    setError(true);
                    setPassword('');
                }
            };
            
            const handleSubmit = (e) => {
                e.preventDefault();
                checkPassword();
            };
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkPassword();
                }
            };
            
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-lg)', zIndex: 1000 }}>
                    <div style={{ background: 'white', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', width: '100%', maxWidth: '320px' }}>
                        <div style={{ textAlign: 'center', marginBottom: 'var(--space-lg)' }}>
                            <Icon name="Lock" size={32} color="var(--color-navy)" />
                            <h2 style={{ marginTop: 'var(--space-md)', fontSize: '1.25rem' }}>Parent Access</h2>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <input 
                                type="password" 
                                value={password} 
                                onChange={(e) => { setPassword(e.target.value); setError(false); }} 
                                onKeyDown={handleKeyDown}
                                placeholder="Password" 
                                autoFocus 
                                style={{ width: '100%', padding: 'var(--space-md)', border: `2px solid ${error ? 'var(--color-error)' : 'var(--color-border)'}`, borderRadius: 'var(--radius-md)', fontSize: '1rem', marginBottom: 'var(--space-md)' }} 
                            />
                            {error && <p style={{ color: 'var(--color-error)', fontSize: '0.85rem', marginBottom: 'var(--space-md)' }}>Incorrect password</p>}
                            <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                                <button type="button" onClick={onCancel} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-cream)', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 500 }}>Cancel</button>
                                <button type="submit" onClick={checkPassword} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-navy)', color: 'white', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 500 }}>Enter</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };
        
        // Feedback Modal
        const FeedbackModal = ({ activity, onSubmit, onCancel }) => {
            const [feedback, setFeedback] = useState('');
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-lg)', zIndex: 1000 }}>
                    <div style={{ background: 'white', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', width: '100%', maxWidth: '400px' }}>
                        <h2 style={{ fontSize: '1.25rem', marginBottom: 'var(--space-sm)' }}>Feedback for {activity?.kidName}</h2>
                        <p style={{ color: 'var(--color-text-light)', fontSize: '0.9rem', marginBottom: 'var(--space-lg)' }}>"{activity?.title}"</p>
                        <textarea value={feedback} onChange={(e) => setFeedback(e.target.value)} placeholder="What changes would help?" rows={4} autoFocus style={{ width: '100%', padding: 'var(--space-md)', border: '2px solid var(--color-border)', borderRadius: 'var(--radius-md)', fontSize: '1rem', fontFamily: 'var(--font-body)', resize: 'vertical', marginBottom: 'var(--space-md)' }} />
                        <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                            <button onClick={onCancel} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-cream)', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 500 }}>Cancel</button>
                            <button onClick={() => onSubmit(feedback)} disabled={!feedback.trim()} style={{ flex: 1, padding: 'var(--space-md)', background: feedback.trim() ? 'var(--color-warning)' : 'var(--color-tan)', color: feedback.trim() ? 'white' : 'var(--color-text-light)', border: 'none', borderRadius: 'var(--radius-md)', cursor: feedback.trim() ? 'pointer' : 'not-allowed', fontWeight: 500 }}>Send</button>
                        </div>
                    </div>
                </div>
            );
        };
        
        // ============================================
        // MAIN APP
        // ============================================
        const App = () => {
            const [screen, setScreen] = useState('welcome');
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [pendingAction, setPendingAction] = useState(null);
            const [feedbackActivity, setFeedbackActivity] = useState(null);
            const [previousScreen, setPreviousScreen] = useState('welcome');
            const [isGoogleSignedIn, setIsGoogleSignedIn] = useState(TokenManager.isSignedIn());
            const [signingIn, setSigningIn] = useState(false);
            const [syncMessage, setSyncMessage] = useState(null);
            const [isOAuthPopup, setIsOAuthPopup] = useState(false);
            const store = useStore();
            
            // Check for OAuth redirect on mount
            useEffect(() => {
                const hash = window.location.hash;
                if (hash.includes('access_token')) {
                    const params = new URLSearchParams(hash.substring(1));
                    const accessToken = params.get('access_token');
                    const expiresIn = params.get('expires_in');
                    if (accessToken) {
                        TokenManager.setToken({
                            access_token: accessToken,
                            expires_in: parseInt(expiresIn) || 3600
                        });
                        
                        if (window.opener && window.opener !== window) {
                            setIsOAuthPopup(true);
                            setTimeout(() => window.close(), 500);
                            return;
                        }
                        
                        setIsGoogleSignedIn(true);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            }, []);
            
            if (isOAuthPopup) {
                return (
                    <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--color-cream)', fontFamily: 'var(--font-body)' }}>
                        <div style={{ textAlign: 'center', padding: 'var(--space-xl)' }}>
                            <div style={{ fontSize: '48px', marginBottom: 'var(--space-md)' }}>✅</div>
                            <p style={{ fontSize: '1.1rem', color: 'var(--color-text)' }}>Signed in! Closing...</p>
                        </div>
                    </div>
                );
            }
            
            const handleGoogleSignIn = async () => {
                setSigningIn(true);
                try {
                    await GoogleAuth.signIn();
                    setIsGoogleSignedIn(true);
                    const unsynced = store.activities.filter(a => !a.syncedToSheets && !a.isSample);
                    if (unsynced.length > 0) {
                        setSyncMessage('Syncing activities...');
                        const count = await store.syncUnsyncedActivities(store.activities);
                        setSyncMessage(count > 0 ? '✅ Synced ' + count + (count === 1 ? ' activity' : ' activities') + ' to Google Sheets!' : null);
                        setTimeout(() => setSyncMessage(null), 4000);
                    }
                } catch (error) {
                    console.error('Sign in failed:', error);
                    alert('Sign in failed. Please try again.');
                } finally {
                    setSigningIn(false);
                }
            };
            
            const handleGoogleSignOut = () => {
                GoogleAuth.signOut();
                setIsGoogleSignedIn(false);
            };
            
            const handleSelectUser = (userId) => { setCurrentUser(userId); setScreen('chat'); };
            const handleBack = () => {
                if (screen === 'chat') { setScreen('welcome'); setCurrentUser(null); store.setRefiningIdea(null); }
                else if (screen === 'dashboard') { setScreen(currentUser ? 'chat' : 'welcome'); }
                else if (screen === 'map') { setScreen(previousScreen); }
            };
            const handleOpenSettings = () => { setPendingAction({ type: 'settings' }); setShowPasswordModal(true); };
            const handleOpenDashboard = () => setScreen('dashboard');
            const handleOpenMap = () => { setPreviousScreen(screen); setScreen('map'); };
            const handlePasswordSuccess = () => { setShowPasswordModal(false); setIsAdmin(true); if (pendingAction?.type === 'settings') setScreen('dashboard'); else if (pendingAction?.type === 'approve') store.approveActivity(pendingAction.activityId); setPendingAction(null); };
            const handleApprove = (id) => { if (isAdmin) store.approveActivity(id); else { setPendingAction({ type: 'approve', activityId: id }); setShowPasswordModal(true); } };
            const handleFeedback = (id) => setFeedbackActivity(store.activities.find(a => a.id === id));
            const handleSubmitFeedback = (feedback) => { if (feedbackActivity) store.updateActivity(feedbackActivity.id, { status: 'needs-revision', parentFeedback: feedback }); setFeedbackActivity(null); };
            
            const handleToggleBooked = (id) => store.toggleBookingStatus(id);
            const handleDeleteBooking = (id) => { if (confirm('Remove this booking item?')) store.deleteBookingItem(id); };

            const handleRefineIdea = (idea) => {
                store.setRefiningIdea(idea);
                setCurrentUser(idea.kidId);
                setScreen('chat');
            };
            const handleSubmitIdea = async (ideaId) => {
                const activity = await store.convertIdeaToActivity(ideaId);
                if (activity) {
                    alert(`"${activity.title}" has been submitted for parent review!`);
                }
            };
            const handleDeleteIdea = (ideaId) => {
                if (confirm('Delete this saved idea?')) {
                    store.deleteSavedIdea(ideaId);
                }
            };
            
            return (
                <div style={{ height: '100%' }}>
                    {screen === 'welcome' && <WelcomeScreen onSelectUser={handleSelectUser} userProfiles={store.userProfiles} activities={store.activities} onOpenSettings={handleOpenSettings} onOpenDashboard={handleOpenDashboard} onOpenMap={handleOpenMap} isGoogleSignedIn={isGoogleSignedIn} onGoogleSignIn={handleGoogleSignIn} onGoogleSignOut={handleGoogleSignOut} signingIn={signingIn} syncMessage={syncMessage} />}
                    {screen === 'chat' && currentUser && <ChatScreen userId={currentUser} user={store.userProfiles[currentUser]} onBack={handleBack} onOpenDashboard={handleOpenDashboard} onOpenMap={handleOpenMap} store={store} />}
                    {screen === 'dashboard' && <DashboardScreen onBack={handleBack} activities={store.activities} savedIdeas={store.savedIdeas} bookingItems={store.bookingItems} userProfiles={store.userProfiles} isAdmin={isAdmin} currentUserId={currentUser} onApprove={handleApprove} onFeedback={handleFeedback} onRefineIdea={handleRefineIdea} onSubmitIdea={handleSubmitIdea} onDeleteIdea={handleDeleteIdea} onToggleBooked={handleToggleBooked} onDeleteBooking={handleDeleteBooking} />}
                    {screen === 'map' && <MapScreen onBack={handleBack} activities={store.activities} userProfiles={store.userProfiles} itinerary={store.itinerary} />}
                    {showPasswordModal && <PasswordModal onSuccess={handlePasswordSuccess} onCancel={() => { setShowPasswordModal(false); setPendingAction(null); }} />}
                    {feedbackActivity && <FeedbackModal activity={feedbackActivity} onSubmit={handleSubmitFeedback} onCancel={() => setFeedbackActivity(null)} />}
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
