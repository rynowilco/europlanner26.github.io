            // All Sheets access via Vercel service account (no OAuth needed)
            async callSheets(payload) {
                const res = await fetch('/api/sheets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('Sheets API error: ' + res.status);
                return res.json();
            },

            async read(sheetName, range = '') {
                try {
                    const payload = { operation: 'read', sheet: sheetName, range: range || 'A:Z' };
                    const data = await this.callSheets(payload);
                    return data.values || [];
                } catch (error) {
                    console.error('Error reading from Sheets:', error);
                    return null;
                }
            },

            async append(sheetName, values) {
                try {
                    await this.callSheets({ operation: 'append', sheet: sheetName, values: [values] });
                    console.log('✅ Synced to Sheets');
                    return true;
                } catch (error) {
                    console.error('Error appending to Sheets:', error);
                    return null;
                }
            },

            async update(sheetName, range, values) {
                try {
                    await this.callSheets({ operation: 'update', sheet: sheetName, range, values });
                    return true;
                } catch (error) {
                    console.error('Error updating Sheets:', error);
                    return null;
                }
            },

            parseActivities(rows) {
                if (!rows || rows.length < 2) return [];
                return rows.slice(1).filter(row => row[0]).map(row => ({
                    id: row[0] || '',
                    kidId: (row[1] || '').toLowerCase(),
                    kidName: row[1] || '',
                    title: row[2] || '',
                    city: row[3] || '',
                    description: row[4] || '',
                    estimatedCost: parseFloat(row[5]) || 0,
                    travelMethod: row[6] || '',
                    travelTime: row[7] || '',
                    duration: row[8] || '',
                    otherConsiderations: row[9] || '',
                    status: (row[10] || 'draft').toLowerCase().replace(' ', '-'),
                    dateSubmitted: row[11] || '',
                    parentFeedback: row[12] || '',
                    dateUpdated: row[13] || '',
                    syncedToSheets: true
                }));
            },

                    profiles[id] = {

                        approvedActivities: parseInt(row[6]) || 0,

                        emoji: emojiMap[id] || '👤',
                        color: colorMap[id] || '#666666',
                        isParent: id === 'ryan' || id === 'mom'
                    };
                });
                return profiles;
            },
            
            // Parse itinerary from sheet data
            parseItinerary(rows) {
                if (!rows || rows.length < 2) return null;
                const cityCoords = {
                    'florence': { lat: 43.7696, lng: 11.2558 },
                    'rome': { lat: 41.9028, lng: 12.4964 },
                    'paris': { lat: 48.8566, lng: 2.3522 },
                    'venice': { lat: 45.4408, lng: 12.3155 },
                    'milan': { lat: 45.4642, lng: 9.1900 },
                    'barcelona': { lat: 41.3851, lng: 2.1734 },
                    'amsterdam': { lat: 52.3676, lng: 4.9041 },
                    'london': { lat: 51.5074, lng: -0.1278 },
                    'frankfurt': { lat: 50.1109, lng: 8.6821 },
                    'iseltwald': { lat: 46.7167, lng: 7.9667 },
                    'basel': { lat: 47.5596, lng: 7.5886 },
                    'lucerne': { lat: 47.0502, lng: 8.3093 },
                    'bern': { lat: 46.9480, lng: 7.4474 },
                    'riomaggiore': { lat: 44.0961, lng: 9.7378 },
                    'noce': { lat: 46.3700, lng: 11.0300 },  // Val di Non, Trentino
                    'verona': { lat: 45.4384, lng: 10.9916 },
                    'lucca': { lat: 43.8430, lng: 10.5050 },
                    'cinque terre': { lat: 44.1461, lng: 9.6439 },
                    'lake garda': { lat: 45.6500, lng: 10.6333 },
                    'dolomites': { lat: 46.4102, lng: 11.8440 },
                    'ortisei': { lat: 46.5744, lng: 11.6717 },
                    'innbrücke': { lat: 47.2800, lng: 11.4500 },
                    'innsbruck': { lat: 47.2692, lng: 11.4041 },
                    'innbruck': { lat: 47.2692, lng: 11.4041 },  // misspelling alias
                    'ampass': { lat: 47.2667, lng: 11.4667 },
                    'train day - kids choice': { lat: 46.0, lng: 9.0 }
                };
                const countryLanguages = {
                    'italy': 'Italian',
                    'france': 'French',
                    'spain': 'Spanish',
                    'netherlands': 'Dutch',
                    'uk': 'English',
                    'england': 'English',
                    'germany': 'German',
                    'switzerland': 'German',
                    'austria': 'German',
                    'switzerland/italy': 'Italian'
                };
                
                let transferCount = 0;
                
                return rows.slice(1).filter(row => row[0]).map((row, index, allRows) => {
                    const city = row[0];
                    const country = row[1] || '';
                    const cityLower = city.toLowerCase();
                    
                    const isTransfer = cityLower.includes('transfer') || cityLower.includes('kids choice');
                    
                    let coords;
                    if (isTransfer) {
                        const prevCity = index > 0 ? allRows[index - 1][0].toLowerCase() : null;
                        const nextCity = index < allRows.length - 1 ? allRows[index + 1][0].toLowerCase() : null;
                        
                        const prevCoords = prevCity && cityCoords[prevCity] ? cityCoords[prevCity] : { lat: 48, lng: 8 };
                        const nextCoords = nextCity && cityCoords[nextCity] ? cityCoords[nextCity] : { lat: 46, lng: 10 };
                        
                        coords = {
                            lat: (prevCoords.lat + nextCoords.lat) / 2,
                            lng: (prevCoords.lng + nextCoords.lng) / 2
                        };
                        transferCount++;
                    } else {
                        coords = cityCoords[cityLower] || { lat: 45, lng: 10 };
                    }
                    
                    return {
                        city,
                        country,
                        startDate: row[2] || '',
                        endDate: row[3] || '',
                        accommodation: row[4] || 'TBD',
                        address: row[5] || '',
                        transport: row[6] || '',
                        notes: row[7] || '',
                        lat: coords.lat,
                        lng: coords.lng,
                        language: countryLanguages[country.toLowerCase()] || 'English',
                        isTransfer: isTransfer
                    };
                });
            },
            
            // Convert activity to row format for sheets
            activityToRow(activity) {
                return [
                    activity.id,
                    activity.kidName,
                    activity.title,
                    activity.city,
                    activity.description,
                    activity.estimatedCost,
                    activity.travelMethod,
                    activity.travelTime,
                    activity.duration,
                    activity.otherConsiderations,
                    activity.status.charAt(0).toUpperCase() + activity.status.slice(1).replace('-', ' '),
                    activity.dateSubmitted,
                    activity.parentFeedback || '',
                    activity.dateUpdated || activity.dateSubmitted
                ];
            },

            parseBookingItems(rows) {
                if (!rows || rows.length < 2) return [];
                return rows.slice(1).filter(row => row[0] && row[5] !== 'deleted').map(row => ({
                    id: row[0] || '',
                    title: row[1] || '',
                    city: row[2] || '',
                    notes: row[3] || '',
                    link: row[4] || '',
                    status: row[5] || 'pending',
                    dateAdded: row[6] || '',
                    dateBooked: row[7] || null,
                    activityId: row[8] || '',
                    syncedToSheets: true
                }));
            },

            parseSavedIdeas(rows) {
                if (!rows || rows.length < 2) return [];
                return rows.slice(1).filter(row => row[0] && row[9] !== 'deleted').map(row => ({
                    id: row[0] || '',
                    kidId: row[1] || '',
                    kidName: row[2] || '',
                    title: row[3] || '',
                    city: row[4] || '',
                    notes: row[5] || '',
                    estimatedCost: parseFloat(row[6]) || 0,
                    dateSaved: row[7] || '',
                    dateUpdated: row[8] || '',
                    syncedToSheets: true
                }));
            },

            ideaToRow(idea, status = 'active') {
                return [
                    idea.id, idea.kidId, idea.kidName, idea.title,
                    idea.city || '', idea.notes || '', idea.estimatedCost || 0,
                    idea.dateSaved, idea.dateUpdated || idea.dateSaved, status
                ];
            },

            parseJournalEntries(rows) {
                if (!rows || rows.length < 2) return [];
                return rows.slice(1).filter(row => row[0]).map(row => ({
                    id: row[0] || '',
                    userId: row[1] || '',
                    userName: row[2] || '',
                    city: row[3] || '',
                    date: row[4] || '',
                    entryText: row[5] || '',
                    mood: row[6] || '',
                    lat: parseFloat(row[7]) || null,
                    lng: parseFloat(row[8]) || null,
                    timestamp: row[9] || '',
                    heartCount: parseInt(row[10]) || 0,
                }));
            },

            journalEntryToRow(entry) {
                return [
                    entry.id, entry.userId, entry.userName, entry.city,
                    entry.date, entry.entryText, entry.mood || '',
                    entry.lat || '', entry.lng || '', entry.timestamp,
                    entry.heartCount || 0, ''
                ];
            },

            // Generic helper: read sheet, find row by ID in col 0, update it
            async findAndUpdateRow(sheetName, id, values) {
                const data = await this.read(sheetName);
                if (!data || data.length < 2) return false;
                const rowIndex = data.slice(1).findIndex(row => row[0] === id);
                if (rowIndex === -1) return false;
                const sheetRow = rowIndex + 2;
                const endCol = String.fromCharCode(64 + values.length);
                await this.update(sheetName, 'A' + sheetRow + ':' + endCol + sheetRow, [values]);
                return true;
            }
        };

        const EmailService = {

                emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);

            },
            
            async sendDigest(kidName, sessionSummary, activitiesSubmitted, toEmail) {
                this.init();
                
                try {
                    const result = await emailjs.send(
                        CONFIG.EMAILJS_SERVICE_ID,
                        CONFIG.EMAILJS_TEMPLATE_ID,
                        {
                            to_email: toEmail,
                            kid_name: kidName,
                            session_summary: sessionSummary || 'Had a planning chat',
                            activities_submitted: activitiesSubmitted || 'None this session'
                        }
                    );
                    console.log('Email sent successfully:', result);
                    return true;
                } catch (error) {
                    console.error('Email send failed:', error);
                    return false;
                }
            },
            
            async sendDigestToBothParents(kidName, sessionSummary, activitiesSubmitted) {
                const results = await Promise.all(
                    CONFIG.PARENT_EMAILS.map(email => 
                        this.sendDigest(kidName, sessionSummary, activitiesSubmitted, email)
                    )
                );

            }

                            const sheetsActivities = SheetsAPI.parseActivities(activitiesData);
                            
                            if (sheetsActivities.length > 0) {
                                // Build a set of IDs that exist in Sheets
                                const sheetsIds = new Set(sheetsActivities.map(a => a.id));
                                
                                // Mark any localStorage activities that exist in Sheets as synced
                                setActivities(prev => {
                                    const updated = prev.map(a => 
                                        sheetsIds.has(a.id) ? { ...a, syncedToSheets: true } : a
                                    );
                                    // Merge: keep Sheets as source of truth, add local-only items
                                    const localOnlyIds = updated
                                        .filter(a => !sheetsIds.has(a.id) && !a.isSample)
                                        .map(a => a.id);
                                    const samples = updated.filter(a => a.isSample);
                                    return [...samples, ...sheetsActivities, ...updated.filter(a => localOnlyIds.includes(a.id))];
                                });
                                
                                console.log('Loaded activities:', sheetsActivities.length);
                            }
                        }
                        
                        // Load user profiles

                            if (parsed && Object.keys(parsed).length > 0) {
                                setUserProfiles(prev => ({ ...prev, ...parsed }));
                                console.log('Loaded user profiles');
                            }

                        // Load itinerary
                        const itineraryData = await SheetsAPI.read(CONFIG.SHEET_NAMES.itinerary);

                        // Load saved ideas

                        if (ideasData && ideasData.length > 1) {
                            const parsedIdeas = SheetsAPI.parseSavedIdeas(ideasData);
                            if (parsedIdeas.length > 0) {
                                setSavedIdeas(parsedIdeas);
                                console.log('Loaded saved ideas:', parsedIdeas.length);
                            }
                        }

                        // Load booking items
                        const bookingData = await SheetsAPI.read(CONFIG.SHEET_NAMES.bookingList);
                        if (bookingData && bookingData.length > 1) {
                            const parsedBookings = SheetsAPI.parseBookingItems(bookingData);
                            if (parsedBookings.length > 0) {
                                setBookingItems(parsedBookings);
                                console.log('Loaded booking items:', parsedBookings.length);
                            }
                        }

                        // Load journal entries
                        const journalData = await SheetsAPI.read(CONFIG.SHEET_NAMES.journal);
                        if (journalData && journalData.length > 1) {
                            const parsedJournal = SheetsAPI.parseJournalEntries(journalData);
                            if (parsedJournal.length > 0) {
                                setJournalEntries(parsedJournal);
                                console.log('Loaded journal entries:', parsedJournal.length);
                            }
                        }

                        // Flush any locally-saved unsynced activities
                        const localRaw = localStorage.getItem('euroPlanner_activities');
                        const localActivities = localRaw ? JSON.parse(localRaw) : [];
                        const unsynced = localActivities.filter(a => !a.syncedToSheets && !a.isSample);
                        if (unsynced.length > 0) {
                            console.log('Flushing', unsynced.length, 'unsynced local activities...');
                            await syncUnsyncedActivities(unsynced);
                        }

                        setSheetsLoaded(true);
                    } catch (error) {
                        console.error('Error loading from Sheets:', error);
                        setSheetsError(error.message);
                        setSheetsLoaded(true);
                    }
                };
                
                loadFromSheets();
            }, []);
            
            // Save to localStorage as backup
            useEffect(() => { localStorage.setItem('euroPlanner_activities', JSON.stringify(activities)); }, [activities]);
            useEffect(() => { localStorage.setItem('euroPlanner_savedIdeas', JSON.stringify(savedIdeas)); }, [savedIdeas]);
            useEffect(() => { localStorage.setItem('euroPlanner_sessionSummaries', JSON.stringify(sessionSummaries)); }, [sessionSummaries]);
            useEffect(() => { localStorage.setItem('euroPlanner_lastActivity', JSON.stringify(lastActivity)); }, [lastActivity]);
            useEffect(() => { localStorage.setItem('euroPlanner_profiles', JSON.stringify(userProfiles)); }, [userProfiles]);
            useEffect(() => { localStorage.setItem('euroPlanner_bookingItems', JSON.stringify(bookingItems)); }, [bookingItems]);
            useEffect(() => { localStorage.setItem('euroPlanner_journalEntries', JSON.stringify(journalEntries)); }, [journalEntries]);
            
            // Saved Ideas management
            const addSavedIdea = async (idea) => {

                    ...idea,
                    id: 'IDEA-' + Date.now(),
                    dateSaved: new Date().toISOString().split('T')[0],
                    dateUpdated: new Date().toISOString().split('T')[0],
                    syncedToSheets: false
                };
                setSavedIdeas(prev => [...prev, newIdea]);
                try {
                    await SheetsAPI.append(CONFIG.SHEET_NAMES.savedIdeas, SheetsAPI.ideaToRow(newIdea));
                    setSavedIdeas(prev => prev.map(i => i.id === newIdea.id ? { ...i, syncedToSheets: true } : i));
                    console.log('Idea saved to Sheets:', newIdea.title);
                } catch (e) {
                    console.error('Failed to sync idea to Sheets:', e);
                }
                return newIdea;
            };
            
            const updateSavedIdea = async (id, updates) => {
                const updatedIdeas = savedIdeas.map(idea =>
                    idea.id === id ? { ...idea, ...updates, dateUpdated: new Date().toISOString().split('T')[0] } : idea
                );
                setSavedIdeas(updatedIdeas);
                const updated = updatedIdeas.find(i => i.id === id);
                if (updated) {
                    try {
                        await SheetsAPI.findAndUpdateRow(CONFIG.SHEET_NAMES.savedIdeas, id, SheetsAPI.ideaToRow(updated));
                    } catch (e) {
                        console.error('Failed to update idea in Sheets:', e);
                    }
                }
            };
            
            const deleteSavedIdea = async (id) => {
                const idea = savedIdeas.find(i => i.id === id);
                setSavedIdeas(prev => prev.filter(i => i.id !== id));
                if (idea) {
                    try {
                        await SheetsAPI.findAndUpdateRow(CONFIG.SHEET_NAMES.savedIdeas, id, SheetsAPI.ideaToRow(idea, 'deleted'));
                    } catch (e) {
                        console.error('Failed to mark idea deleted in Sheets:', e);
                    }
                }
            };
            
            const convertIdeaToActivity = async (ideaId) => {
                const idea = savedIdeas.find(i => i.id === ideaId);
                if (!idea) return null;
                
                const newActivity = await addActivity({
                    title: idea.title,

                    travelTime: idea.travelTime || 'TBD',

            const addActivity = async (activity) => {
                const newActivity = { 
                    ...activity, 
                    id: `ACT-${Date.now()}`, 
                    dateSubmitted: new Date().toISOString().split('T')[0],
                    dateUpdated: new Date().toISOString().split('T')[0],
                    status: 'submitted',
                    syncedToSheets: false
                };
                setActivities(prev => [...prev, newActivity]);
                
                console.log('Adding activity:', newActivity.title);
                try {
                    await SheetsAPI.append(CONFIG.SHEET_NAMES.activities, SheetsAPI.activityToRow(newActivity));
                    console.log('Activity synced to Sheets:', newActivity.title);
                    setActivities(prev => prev.map(a => a.id === newActivity.id ? { ...a, syncedToSheets: true } : a));
                } catch (error) {
                    console.error('Error syncing activity to Sheets (will retry on next load):', error);
                }
                
                return newActivity;
            };
            
            // Flush any locally-saved unsynced activities to Sheets
            // Deduplicates by ID (primary) and by kidName+title (fallback for legacy activities)
            const syncUnsyncedActivities = async (currentActivities) => {
                const unsynced = (currentActivities || []).filter(a => !a.syncedToSheets && !a.isSample);
                if (unsynced.length === 0) return 0;
                
                // Fetch existing rows from Sheet for dedup
                let existingIds = new Set();
                let existingTitleKeys = new Set(); // "kidname|title" fallback
                try {
                    const sheetsData = await SheetsAPI.read(CONFIG.SHEET_NAMES.activities);
                    if (sheetsData && sheetsData.length > 1) {
                        sheetsData.slice(1).forEach(row => {
                            if (row[0]) existingIds.add(row[0]);
                            if (row[1] && row[2]) existingTitleKeys.add(row[1].toLowerCase() + '|' + row[2].toLowerCase());
                        });
                    }
                } catch (e) {
                    console.warn('Could not fetch existing IDs for dedup check:', e);
                }
                
                console.log('Dedup: ' + existingIds.size + ' IDs, ' + existingTitleKeys.size + ' title keys in Sheet');
                console.log('Attempting to sync ' + unsynced.length + ' local activities');
                
                let synced = 0;
                let skipped = 0;
                for (const activity of unsynced) {
                    const titleKey = activity.kidName.toLowerCase() + '|' + activity.title.toLowerCase();
                    if (existingIds.has(activity.id) || existingTitleKeys.has(titleKey)) {
                        setActivities(prev => prev.map(a => a.id === activity.id ? { ...a, syncedToSheets: true } : a));
                        console.log('Skipped duplicate:', activity.title);
                        skipped++;
                        continue;
                    }
                    try {
                        await SheetsAPI.append(CONFIG.SHEET_NAMES.activities, SheetsAPI.activityToRow(activity));
                        setActivities(prev => prev.map(a => a.id === activity.id ? { ...a, syncedToSheets: true } : a));
                        synced++;
                    } catch (error) {
                        console.error('Failed to sync activity:', activity.title, error);
                    }
                }
                console.log('Sync complete: ' + synced + ' new, ' + skipped + ' duplicates skipped');
                return synced;

            const addBookingItem = async (item) => {

                    id: 'BOOK-' + Date.now(),
                    status: 'pending',
                    dateAdded: new Date().toISOString().split('T')[0],
                    dateBooked: null,

                };

                try {
                    const row = [
                        newItem.id,

                        newItem.status,
                        newItem.dateAdded,

        const callClaudeAPI = async (messages, systemPrompt) => {
            try {
                const response = await fetch('/api/claude', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: CONFIG.CLAUDE_MODEL,
                        max_tokens: 1024,
                        system: systemPrompt,
                        messages: messages.map(m => ({ role: m.isUser ? 'user' : 'assistant', content: m.text }))
                    })
                });
                
                if (!response.ok) {
                    let errorDetail = '';
                    try {
                        const errorData = await response.json();
                        errorDetail = JSON.stringify(errorData);
                        console.error('API Error Details:', errorData);
                    } catch (e) {
                        errorDetail = await response.text();
                    }
                    throw new Error(`API error ${response.status}: ${errorDetail}`);
                }
                
                const data = await response.json();
                
                // Log full response shape for debugging
                console.log('API response stop_reason:', data.stop_reason);
                console.log('API response content types:', data.content?.map(b => b.type));

                // Guard: API may return an error object instead of content array
                if (!data || !data.content || !Array.isArray(data.content)) {
                    console.error('Unexpected API response structure:', JSON.stringify(data));
                    // Surface the real error message if present
                    const msg = data?.error?.message || data?.message || JSON.stringify(data);
                    return `Something went wrong with the AI connection: ${msg}`;
                }

                // Extract text blocks only — web search adds tool_use / tool_result blocks
                const textBlocks = data.content.filter(block => block.type === 'text');
                
                if (textBlocks.length === 0) {
                    console.error('No text blocks in response. Full content:', JSON.stringify(data.content));
                    return `I got a response but couldn't read it (no text blocks). Check the browser console for details.`;
                }
                
                return textBlocks.map(block => block.text).join('');

            } catch (error) {
                console.error('Claude API error:', error);
                if (error.message.includes('401')) {
                    return `Authentication issue with the AI. (Error: 401 Unauthorized)`;
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    return `Can't reach the AI right now. Check your internet connection and try again.`;
                }
                return `Connection error: ${error.message}`;
            }
        };

            const [previousSummary, setPreviousSummary] = useState(null);
            const [pendingActivity, setPendingActivity] = useState(null);
            const messagesEndRef = useRef(null);
            const idleTimerRef = useRef(null);
            
            const messagesRef = useRef(messages);
            const sessionActivitiesRef = useRef(sessionActivities);
            useEffect(() => { messagesRef.current = messages; }, [messages]);
            useEffect(() => { sessionActivitiesRef.current = sessionActivities; }, [sessionActivities]);
            
            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, pendingActivity]);
            
            const resetIdleTimer = () => {
                store.updateLastActivity(userId);

                idleTimerRef.current = setTimeout(() => {
                    saveSessionToSheets('idle');

            const saveSessionToSheets = (reason) => {
                const currentMessages = messagesRef.current;
                const currentActivities = sessionActivitiesRef.current;
                const userMessages = currentMessages.filter(m => m.isUser);
                if (userMessages.length === 0) return;
                
                const topics = userMessages.map(m => m.text).slice(-5);
                const activitiesSubmitted = currentActivities.map(a => `${a.title} in ${a.city}`);
                const recentContext = currentMessages.slice(-4).map(m =>
                    m.isUser ? `You asked: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                             : `We discussed: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                );
                
                const summary = { topics, activitiesSubmitted, recentContext, messageCount: currentMessages.length };
                store.saveSessionSummary(userId, summary);
                store.saveConversationSummaryToSheets(userId, {
                    topics: `[${reason}] ` + topics.join(', '),
                    ideas: activitiesSubmitted.join(', '),
                    notes: recentContext.join(' | ')
                }).catch(err => console.log('Sheets save error:', err));
            };
            
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'hidden') {
                        saveSessionToSheets('visibility-hidden');
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (idleTimerRef.current) clearTimeout(idleTimerRef.current);
                    saveSessionToSheets('unmount');
                };
            }, []);
            
            const sendActivityEmail = async (activity) => {
                await EmailService.sendDigestToBothParents(
                    user.name,
                    `Submitted a new activity for review!`,
                    `• ${activity.title} in ${activity.city} (€${activity.estimatedCost})\n\n${activity.description}`
                );
            };
            
            const generateSessionSummary = () => {
                const userMessages = messagesRef.current.filter(m => m.isUser);
                if (userMessages.length === 0) return null;
                const topics = userMessages.map(m => m.text).slice(-5);
                const activitiesSubmitted = sessionActivitiesRef.current.map(a => `${a.title} in ${a.city}`);
                const recentContext = messagesRef.current.slice(-4).map(m =>
                    m.isUser ? `You asked: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                             : `We discussed: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                );
                return { topics, activitiesSubmitted, recentContext, messageCount: messagesRef.current.length };
            };
            
            const handleSessionEnd = (reason) => {
                saveSessionToSheets(reason);
                
                const summary = generateSessionSummary();
                if (summary) {
                    const topicsText = summary.topics.join('\n• ');
                    const activitiesText = summary.activitiesSubmitted.length > 0
                        ? summary.activitiesSubmitted.map(a => `• ${a}`).join('\n')
                        : 'No new activities submitted this session';
                    EmailService.sendDigestToBothParents(
                        user.name,
                        `Topics discussed:\n• ${topicsText}`,
                        activitiesText
                    ).catch(err => console.log('Email send error:', err));
                }
                
                if (reason === 'back') onBack();
            };
            
            const handleBack = () => {
                handleSessionEnd('back');
            };
            
            const handleResume = () => {
                setShowResumePrompt(false);
                store.clearSessionSummary(userId);
                
                const summaryText = previousSummary.recentContext.join('\n');
                const resumeMsg = { id: Date.now(), text: `Last time we chatted, here's what we covered:\n\n${summaryText}\n\nWant to pick up where we left off, or explore something new?`, isUser: false };
                setMessages([resumeMsg]);
                resetIdleTimer();
            };
            
            const handleStartFresh = () => {
                setShowResumePrompt(false);
                store.clearSessionSummary(userId);
                
                const cities = (store.itinerary || CONFIG.itinerary).map(i => i.city).join(', ');
                const freshMsg = { id: Date.now(), text: `Hey ${user.name}! 👋 Fresh start! Ready to plan some adventures for Europe?\n\nWe can explore ideas for ${cities}. What sounds fun to you?`, isUser: false };
                setMessages([freshMsg]);
                resetIdleTimer();
            };
            
            useEffect(() => {
                if (!started) {
                    setStarted(true);
                    
                    const existingSummary = store.getSessionSummary(userId);
                    const sessionExpired = store.isSessionExpired(userId);
                    
                    const needsRevision = store.activities.filter(a => 
                        a.kidId === userId && a.status === 'needs-revision' && !a.isSample
                    );
                    
                    const refiningIdea = store.refiningIdea;
                    
                    setIsLoading(true);
                    setTimeout(async () => {
                        const cities = (store.itinerary || CONFIG.itinerary).map(i => i.city).join(', ');
                        
                        if (refiningIdea && refiningIdea.kidId === userId) {
                            const ideaDetails = refiningIdea.notes ? `\n\nHere's what we had:\n• **${refiningIdea.title}** in ${refiningIdea.city}\n• Notes: ${refiningIdea.notes}${refiningIdea.estimatedCost ? `\n• Estimated cost: ~€${refiningIdea.estimatedCost}` : ''}` : '';
                            const greeting = `Hey ${user.name}! 👋 You wanted to revisit your saved idea for **${refiningIdea.title}**.${ideaDetails}\n\nWhat would you like to explore or change about this idea? We can dig into more details, adjust the plan, or get it ready to submit!`;
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                            store.clearSessionSummary(userId);
                            store.setRefiningIdea(null);
                        } else if (needsRevision.length > 0) {
                            const feedbackItems = needsRevision.map(a => 
                                `**${a.title}**: "${a.parentFeedback}"`
                            ).join('\n\n');
                            const greeting = `Hey ${user.name}! 👋 Quick heads up - your parents left some feedback on ${needsRevision.length === 1 ? 'an activity' : 'some activities'}:\n\n${feedbackItems}\n\nWant to work on revising ${needsRevision.length === 1 ? 'it' : 'one of them'}, or explore something new?`;
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                            store.clearSessionSummary(userId);
                        } else if (user.isParent) {
                            // Parents always get fresh status card — skip resume prompt
                            store.clearSessionSummary(userId);
                            const allActivities = store.activities.filter(a => !a.isSample);
                            const abbyApproved = allActivities.filter(a => a.kidId === 'abby' && a.status === 'approved').length;
                            const abbyPending = allActivities.filter(a => a.kidId === 'abby' && a.status === 'submitted').length;
                            const tylerApproved = allActivities.filter(a => a.kidId === 'tyler' && a.status === 'approved').length;
                            const tylerPending = allActivities.filter(a => a.kidId === 'tyler' && a.status === 'submitted').length;
                            const deadlineDays = Math.ceil((new Date('2026-05-11') - new Date()) / (1000 * 60 * 60 * 24));
                            
                            const statusLines = [
                                '⚽ **Abby:** ' + abbyApproved + '/3 approved' + (abbyPending > 0 ? ', ' + abbyPending + ' waiting on you' : ' ✓'),
                                '🏈 **Tyler:** ' + tylerApproved + '/3 approved' + (tylerPending > 0 ? ', ' + tylerPending + ' waiting on you' : ' ✓'),
                                '📅 **Deadline:** May 11 (' + deadlineDays + ' days away)'
                            ].join('\n');
                            
                            const greeting = 'Hey ' + user.name + '! 👋 Here\'s where things stand:\n\n' + statusLines + '\n\nWhat do you want to work on? I can help with logistics, train routes, reviewing submitted activities, the booking list — whatever\'s on your mind.';
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                        } else if (existingSummary) {
                            setPreviousSummary(existingSummary.summary);
                            setShowResumePrompt(true);
                        } else {
                            const greeting = 'Hey ' + user.name + '! 👋 Ready to plan some adventures for Europe?\n\nWe can explore ideas for ' + cities + '. What sounds fun to you?';
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                        }
                        
                        setIsLoading(false);
                        resetIdleTimer();
                    }, 500);
                }

            const parseActivitySubmission = (text) => {
                const match = text.match(/\[SUBMIT_ACTIVITY\]([\s\S]*?)\[\/SUBMIT_ACTIVITY\]/);
                if (!match) return null;
                
                const content = match[1];
                const getValue = (field) => {
                    const regex = new RegExp(`${field}:\\s*(.+?)(?:\\n|$)`, 'i');
                    const m = content.match(regex);
                    return m ? m[1].trim() : '';
                };
                
                return {
                    title: getValue('Title'),
                    city: getValue('City'),
                    description: getValue('Description'),
                    estimatedCost: parseFloat(getValue('Cost')) || 0,
                    travelMethod: getValue('Travel Method'),
                    travelTime: getValue('Travel Time'),
                    duration: getValue('Duration'),
                    otherConsiderations: getValue('Considerations'),
                    conflictNote: getValue('ConflictNote') || null
                };
            };
            
            const parseIdeaSave = (text) => {
                const match = text.match(/\[SAVE_IDEA\]([\s\S]*?)\[\/SAVE_IDEA\]/);
                if (!match) return null;
                
                const content = match[1];
                const getValue = (field) => {
                    const regex = new RegExp(`${field}:\\s*(.+?)(?:\\n|$)`, 'i');
                    const m = content.match(regex);
                    return m ? m[1].trim() : '';
                };
                
                return {
                    title: getValue('Title'),
                    city: getValue('City'),
                    notes: getValue('Notes'),
                    estimatedCost: parseFloat(getValue('Cost')) || 0
                };
            };
            
            const parseBookingSave = (text) => {
                const match = text.match(/\[ADD_BOOKING\]([\s\S]*?)\[\/ADD_BOOKING\]/);
                if (!match) return null;
                const content = match[1];
                const getValue = (field) => {
                    const regex = new RegExp(field + ':\\s*(.+?)(?:\\n|$)', 'i');
                    const m = content.match(regex);
                    return m ? m[1].trim() : '';
                };
                return {
                    title: getValue('Title'),
                    city: getValue('City'),
                    notes: getValue('Notes'),
                    link: getValue('Link') || null
                };
            };

            const cleanResponseForDisplay = (text) => {
                return text
                    .replace(/\[SUBMIT_ACTIVITY\][\s\S]*?\[\/SUBMIT_ACTIVITY\]/g, '')
                    .replace(/\[SAVE_IDEA\][\s\S]*?\[\/SAVE_IDEA\]/g, '')
                    .replace(/\[ADD_BOOKING\][\s\S]*?\[\/ADD_BOOKING\]/g, '')

            };
            
            const sendMessage = async (overrideText) => {
                const text = typeof overrideText === 'string' ? overrideText : inputValue;
                if (!text.trim() || isLoading) return;
                resetIdleTimer();
                
                const userMsg = { id: Date.now(), text: text.trim(), isUser: true };
                setMessages(prev => [...prev, userMsg]);

                setIsLoading(true);
                
                const systemPrompt = generateSystemPrompt(user, userId, store.activities, store.itinerary);
                const response = await callClaudeAPI([...messages, userMsg], systemPrompt);
                
                // Guard: if response is null/undefined, show error and bail

                    console.error("callClaudeAPI returned null/undefined");
                    setMessages(prev => [...prev, { id: Date.now() + 1, text: "Sorry, something went wrong. Please try again.", isUser: false }]);
                    setIsLoading(false);
                    return;

                const activityData = parseActivitySubmission(response);
                
                if (activityData && activityData.title) {
                    console.log('Activity detected - showing confirmation:', activityData.title);
                    setPendingActivity({
                        ...activityData,
                        kidId: userId,
                        kidName: user.name
                    });
                }
                
                const ideaData = parseIdeaSave(response);
                
                if (ideaData && ideaData.title) {
                    console.log('Idea detected - saving:', ideaData.title);
                    store.addSavedIdea({
                        ...ideaData,
                        kidId: userId,
                        kidName: user.name
                    });
                }

                const bookingData = parseBookingSave(response);
                if (bookingData && bookingData.title) {
                    console.log('Booking item detected - saving:', bookingData.title);
                    store.addBookingItem(bookingData);
                }
                
                const displayResponse = cleanResponseForDisplay(response);
                
                const assistantMsg = { id: Date.now() + 1, text: displayResponse, isUser: false };
                setMessages(prev => [...prev, assistantMsg]);
                setIsLoading(false);
            };
            
            const handleConfirmActivity = async () => {
                if (!pendingActivity) return;
                
                console.log('✅ User confirmed activity submission:', pendingActivity.title);
                const newActivity = await store.addActivity(pendingActivity);
                console.log('Activity submitted:', newActivity);
                
                setSessionActivities(prev => [...prev, newActivity]);
                await sendActivityEmail(newActivity);
                setPendingActivity(null);
                
                const confirmMsg = { 
                    id: Date.now(), 
                    text: `✅ **${newActivity.title}** has been submitted for parent review! You can check its status in the Dashboard.`, 
                    isUser: false 
                };
                setMessages(prev => [...prev, confirmMsg]);
            };
            
            const handleKeepPlanning = () => {
                console.log('User chose to keep planning, dismissing confirmation card');
                setPendingActivity(null);
            };

                        <button onClick={handleBack} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}>
                            <Icon name="ArrowLeft" size={20} />
                        </button>
                        <div style={{ width: '36px', height: '36px', borderRadius: 'var(--radius-sm)', background: user.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '18px' }}>{user.emoji}</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 600, fontSize: '1rem' }}>{user.name}'s Planning</div>

                        </div>
                        <button onClick={onOpenMap} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}>
                            <Icon name="Map" size={20} />
                        </button>
                        <button onClick={onOpenDashboard} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}>
                            <Icon name="List" size={20} />
                        </button>
                    </header>
                    
                    {/* Resume prompt overlay */}
                    {showResumePrompt && (
                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-xl)', background: 'var(--color-cream)' }}>
                            <div style={{ background: 'white', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', maxWidth: '400px', width: '100%', boxShadow: 'var(--shadow-lg)', textAlign: 'center' }}>
                                <div style={{ fontSize: '48px', marginBottom: 'var(--space-md)' }}>👋</div>
                                <h2 style={{ fontSize: '1.25rem', fontWeight: 600, marginBottom: 'var(--space-sm)' }}>Welcome back, {user.name}!</h2>
                                <p style={{ color: 'var(--color-text-light)', marginBottom: 'var(--space-lg)', fontSize: '0.95rem' }}>
                                    You had a planning session on {previousSummary?.date || 'recently'}. Want to pick up where you left off?
                                </p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-sm)' }}>
                                    <button onClick={handleResume} style={{ padding: 'var(--space-md)', background: user.color, color: 'white', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '1rem', fontWeight: 500 }}>
                                        Continue where I left off
                                    </button>
                                    <button onClick={handleStartFresh} style={{ padding: 'var(--space-md)', background: 'var(--color-cream)', color: 'var(--color-text)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '1rem', fontWeight: 500 }}>
                                        Start fresh
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Regular chat view */}
                    {!showResumePrompt && (
                        <>
                            <div style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-md)' }}>
                                {messages.map(msg => <ChatMessage key={msg.id} message={msg.text} isUser={msg.isUser} />)}
                                {isLoading && <ChatMessage isTyping />}
                                
                                {/* Activity Confirmation Card */}
                                {pendingActivity && (
                                    <div style={{ 
                                        background: 'linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%)', 
                                        borderRadius: 'var(--radius-lg)', 
                                        padding: 'var(--space-lg)', 
                                        marginTop: 'var(--space-md)',
                                        border: '2px solid var(--color-success)',
                                        boxShadow: 'var(--shadow-md)'
                                    }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-sm)', marginBottom: 'var(--space-md)' }}>
                                            <h3 style={{ fontSize: '1.1rem', fontWeight: 600, color: 'var(--color-success)' }}>Ready to Submit?</h3>
                                        </div>
                                        
                                        <div style={{ background: 'white', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', marginBottom: 'var(--space-md)' }}>
                                            <h4 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: 'var(--space-xs)' }}>{pendingActivity.title}</h4>
                                            <p style={{ fontSize: '0.85rem', color: 'var(--color-text-light)', marginBottom: 'var(--space-sm)' }}>📍 {pendingActivity.city}</p>
                                            <p style={{ fontSize: '0.9rem', marginBottom: 'var(--space-md)', lineHeight: 1.5 }}>{pendingActivity.description}</p>
                                            
                                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 'var(--space-md)', fontSize: '0.85rem', color: 'var(--color-text-light)' }}>
                                                <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                    <Icon name="DollarSign" size={14} /> €{pendingActivity.estimatedCost} (~${(pendingActivity.estimatedCost * CONFIG.softParams.eurToUsdRate).toFixed(0)})
                                                </span>
                                                <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                    <Icon name="Clock" size={14} /> {pendingActivity.duration}
                                                </span>
                                                <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                    <Icon name="MapPin" size={14} /> {pendingActivity.travelMethod} ({pendingActivity.travelTime})
                                                </span>
                                            </div>
                                            
                                            {pendingActivity.otherConsiderations && (

                                                }}
                                            >

                                                    display: 'flex',

                                                    gap: 'var(--space-sm)'

                                    <button onClick={sendMessage} disabled={!inputValue.trim() || isLoading || !!pendingActivity} style={{ width: '48px', height: '48px', borderRadius: 'var(--radius-full)', border: 'none', background: inputValue.trim() && !pendingActivity ? user.color : 'var(--color-tan)', color: inputValue.trim() ? 'white' : 'var(--color-text-light)', cursor: inputValue.trim() && !isLoading && !pendingActivity ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <Icon name="Send" size={20} />

                                {/* Chat prompt chips — scrolls horizontally on mobile */}
                                <div style={{ display: 'flex', gap: 'var(--space-sm)', marginTop: 'var(--space-sm)', overflowX: 'auto', paddingBottom: '2px' }}>

                                        { label: "What's the Plan", icon: 'Calendar', prompt: "Walk me through the full trip plan — cities, dates, transfer days, and anything notable we need to prepare for." },
                                        { label: 'All Activities', icon: 'List', prompt: 'Show me all submitted and approved activities across the whole family.' },
                                        { label: 'Trip Logistics', icon: 'Map', prompt: 'Help me think through the logistics of this trip — trains between cities, what needs booking in advance, transfer day plans, and anything I might be missing.' },
                                        { label: 'Booking List', icon: 'Book', prompt: 'What things do we still need to book or reserve for this trip? Check what has already been flagged and suggest anything else I should be thinking about.' },
                                        { label: "What's the Story", icon: 'BookOpen', prompt: "Tell me the story of our trip so far — what are we doing, what's been proposed, what are we most excited about? Give it to me as a fun narrative, not a list." }
                                    ] : [
                                        { label: 'Give me Ideas', icon: 'Sparkles', prompt: 'Give me some activity ideas for this trip based on my interests!' },
                                        { label: "What's the Plan", icon: 'Calendar', prompt: "What's the full trip plan? Walk me through the cities, transfer days, and dates." },
                                        { label: 'My Activities', icon: 'List', prompt: 'Show me all the activities I have submitted or that have been approved so far.' },
                                        { label: 'All Activities', icon: 'Users', prompt: 'Show me all approved activities for the whole family so I can see what everyone is doing and avoid conflicts.' },
                                        { label: "What's the Story", icon: 'BookOpen', prompt: "Tell me the story of our trip so far — what are we doing, what's been proposed, what are we most excited about? Give it to me as a fun narrative, not a list." },

                                                        onSubmit={onSubmitIdea}
                                                        onDelete={onDeleteIdea}

        // Map Screen with Leaflet
        const MapScreen = ({ onBack, activities, userProfiles, itinerary }) => {

                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(map);

                // Auto-fit bounds to itinerary destinations (exclude transfer days from bounds calc)
                const mainCities = tripItinerary.filter(c => !c.isTransfer);
                if (mainCities.length > 1) {
                    const bounds = L.latLngBounds(mainCities.map(c => [c.lat, c.lng]));

                        : '<div style="background: var(--color-terracotta); width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.25);"></div>',
                    iconSize: isTransfer ? [26, 26] : [30, 30],
                    iconAnchor: isTransfer ? [13, 13] : [15, 30],
                    popupAnchor: [0, -32]

                tripItinerary.forEach((city) => {
                    const isTransfer = city.isTransfer || city.city.toLowerCase().includes('transfer') || city.city.toLowerCase().includes('kids choice');

                        icon: createIcon(isTransfer)

                    // City name label with date range
                    const formatDate = (dateStr) => {

                        iconAnchor: [-18, 14]

                    L.marker([city.lat, city.lng], { icon: label, interactive: false }).addTo(map);

                // Small dots for approved activities
                activities.filter(a => !a.isSample && a.status === 'approved').forEach(activity => {

                            className: 'activity-marker',

                            iconAnchor: [5, 5]

                mapInstanceRef.current = map;

                return () => {
                    if (mapInstanceRef.current) {

            // Fuzzy city match: catches "Basel (Transfer Day)", "Near Florence", etc.

            const cityMatchesSafe = (activityCity, markerCity) => {
                if (!activityCity || !markerCity) return false;
                const a = activityCity.toLowerCase();
                const b = markerCity.toLowerCase();
                return a === b || a.includes(b) || b.includes(a);
            };
            const cityActivities = selectedCity ? activities.filter(a => cityMatchesSafe(a.city, selectedCity.city) && !a.isSample) : [];

                    <div style={{ flex: 1, position: 'relative' }}>

                            <div style={{
                                position: 'absolute',
                                bottom: 0,
                                left: 0,
                                right: 0,

                                                Planned Activities
                                            </h3>

                                                const userProfile = userProfiles[a.kidId];
                                                const statusColor = a.status === 'approved' ? '#E8F5E9' : a.status === 'submitted' ? '#FFF3E0' : 'var(--color-cream)';
                                                const statusLabel = a.status === 'approved' ? 'approved' : a.status === 'submitted' ? 'pending' : a.status;
                                                const statusTextColor = a.status === 'approved' ? 'var(--color-success)' : a.status === 'submitted' ? 'var(--color-warning)' : 'var(--color-text-light)';

                                                        {phrase.pronunciation}

                                                        💡 {phrase.when}
                                                    </div>
                                                </div>
                                            ))}

                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {!selectedCity && (

                                zIndex: 1000
                            }}>
                                👆 Tap a city to see details & phrases
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        

        // ============================================
        // TRACKER SCREEN (Follow Along)
        // ============================================

                    subdomains: 'abcd', maxZoom: 19
                }).addTo(map);

                const mainCities = tripItinerary.filter(c => !isTransferCity(c));
                if (mainCities.length > 1) {

                }

                L.polyline(tripItinerary.map(c => [c.lat, c.lng]), {
                    color: '#C4704F', weight: 2.5, dashArray: '8, 8', opacity: 0.6
                }).addTo(map);

                const formatDate = (d) => {
                    if (!d) return '';
                    const dt = new Date(d + 'T00:00:00');
                    return (dt.getMonth() + 1) + '/' + dt.getDate();
                };

                tripItinerary.forEach((city) => {
                    const isTransfer = isTransferCity(city);
                    const markerIcon = L.divIcon({
                        className: 'custom-marker',
                        html: isTransfer
                            ? '<div style="background:var(--color-gold);width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:12px;">&#128642;</div>'
                            : '<div style="background:var(--color-terracotta);width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.25);"></div>',

                        iconAnchor: isTransfer ? [12, 12] : [15, 30]

                    const marker = L.marker([city.lat, city.lng], { icon: markerIcon }).addTo(map);
                    marker.on('click', () => {
                        setSelectedCity(city);
                        setAiSummary(null);
                        map.flyTo([city.lat, city.lng], 11, { duration: 0.5 });
                    });

                    const dateLabel = (!isTransfer && city.startDate && city.endDate)
                        ? ' <span style="opacity:0.65;font-size:9px;margin-left:3px;">' + formatDate(city.startDate) + '&ndash;' + formatDate(city.endDate) + '</span>'

            useEffect(() => {

                const cityActivities = activities.filter(a => {
                    const ac = (a.city || '').toLowerCase();

                const activityList = cityActivities.length > 0
