                                                {loadingSummary ? (
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-sm)', color: 'var(--color-text-light)', fontSize: '0.9rem' }}>
                                                        <div style={{ width: '16px', height: '16px', border: '2px solid var(--color-tan)', borderTopColor: 'var(--color-terracotta)', borderRadius: '50%', animation: 'spin 0.8s linear infinite', flexShrink: 0 }} />
                                                        Generating summary...
                                                    </div>
                                                ) : (
                                                    <div className="markdown-content" style={{ fontSize: '0.95rem', lineHeight: 1.65, color: 'var(--color-text)' }} dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined' ? marked.parse(aiSummary || '') : aiSummary }} />
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {!selectedCity && (
                                <div style={{ position: 'absolute', bottom: 'var(--space-lg)', left: '50%', transform: 'translateX(-50%)', background: 'white', padding: 'var(--space-sm) var(--space-md)', borderRadius: 'var(--radius-full)', boxShadow: 'var(--shadow-md)', fontSize: '0.9rem', color: 'var(--color-text-light)', whiteSpace: 'nowrap', zIndex: 1000 }}>
                                    &#128070; Tap a city to see what's planned
                                </div>
                            )}
                        </div>

                    {trackerTab === 'memories' && (() => {
                        const allEntries = (journalEntries || []).filter(e => e.userId && e.entryText);
                        const hearted = JSON.parse(localStorage.getItem('euroPlanner_heartedEntries') || '[]');
                        const grouped = allEntries.reduce((acc, e) => {
                            if (!acc[e.city]) acc[e.city] = [];
                            acc[e.city].push(e);
                            return acc;
                        }, {});
                        return (
                            <div style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-md)' }}>
                                {allEntries.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: 'var(--space-2xl) var(--space-lg)', animation: 'fadeIn 0.5s ease-out' }}>
                                        <div style={{ fontSize: '52px', marginBottom: 'var(--space-md)' }}>📖</div>
                                        <p style={{ fontWeight: 600, color: 'var(--color-navy)', marginBottom: 'var(--space-sm)' }}>No memories yet</p>
                                        <p style={{ color: 'var(--color-text-light)', fontSize: '0.9rem', lineHeight: 1.6 }}>Check back once the adventure starts — Team Wonder &amp; Awe will post their moments here!</p>
                                    </div>
                                ) : Object.entries(grouped).map(([city, entries]) => (
                                    <div key={city} style={{ marginBottom: 'var(--space-xl)', animation: 'slideUp 0.4s ease-out' }}>
                                        <div style={{ fontSize: '0.75rem', fontWeight: 700, color: 'var(--color-text-light)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: 'var(--space-sm)' }}>
                                            📍 {city}
                                        </div>
                                        {[...entries].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).map(entry => {
                                            const isHearted = hearted.includes(entry.id);
                                            return (
                                                <div key={entry.id} style={{ background: 'white', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', marginBottom: 'var(--space-sm)', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--color-border)' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 'var(--space-sm)' }}>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                            <span style={{ fontSize: '0.85rem', fontWeight: 600, color: 'var(--color-navy)' }}>{entry.userName}</span>
                                                            <span style={{ fontSize: '0.8rem', color: 'var(--color-text-light)' }}>
                                                                {new Date(entry.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                                            </span>
                                                        </div>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                            {entry.mood && <span style={{ fontSize: '18px', lineHeight: 1 }}>{entry.mood}</span>}
                                                            <button onClick={() => onHeartEntry && onHeartEntry(entry.id)} style={{ display: 'flex', alignItems: 'center', gap: '4px', background: isHearted ? '#FFF0F0' : 'var(--color-cream)', border: isHearted ? '1px solid #FFCCCC' : '1px solid var(--color-border)', borderRadius: 'var(--radius-full)', padding: '4px 10px', cursor: 'pointer', fontSize: '0.85rem', color: isHearted ? 'var(--color-error)' : 'var(--color-text-light)', fontWeight: 600, transition: 'all 0.15s' }}>
                                                                {isHearted ? '❤️' : '🤍'} {entry.heartCount > 0 ? entry.heartCount : ''}
                                                            </button>
                                                        </div>
                                                    </div>
                                                    <p style={{ fontSize: '0.95rem', lineHeight: 1.65, color: 'var(--color-text)', margin: 0, whiteSpace: 'pre-wrap' }}>{entry.entryText}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        );
                    })()}
                </div>
            );
        };

        // Password Modal
        const PasswordModal = ({ onSuccess, onCancel }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);
            
            const checkPassword = () => {
                if (password === CONFIG.adminPassword) {
                    onSuccess();
                } else {
                    setError(true);
                    setPassword('');
                }
            };
            
            const handleSubmit = (e) => {
                e.preventDefault();
                checkPassword();
            };
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkPassword();
                }
            };
            
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-lg)', zIndex: 1000 }}>
                    <div style={{ background: 'white', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', width: '100%', maxWidth: '320px' }}>
                        <div style={{ textAlign: 'center', marginBottom: 'var(--space-lg)' }}>
                            <Icon name="Lock" size={32} color="var(--color-navy)" />
                            <h2 style={{ marginTop: 'var(--space-md)', fontSize: '1.25rem' }}>Parent Access</h2>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <input 
                                type="password" 
                                value={password} 
                                onChange={(e) => { setPassword(e.target.value); setError(false); }} 
                                onKeyDown={handleKeyDown}
                                placeholder="Password" 
                                autoFocus 
                                style={{ width: '100%', padding: 'var(--space-md)', border: `2px solid ${error ? 'var(--color-error)' : 'var(--color-border)'}`, borderRadius: 'var(--radius-md)', fontSize: '1rem', marginBottom: 'var(--space-md)' }} 
                            />
                            {error && <p style={{ color: 'var(--color-error)', fontSize: '0.85rem', marginBottom: 'var(--space-md)' }}>Incorrect password</p>}
                            <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                                <button type="button" onClick={onCancel} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-cream)', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 500 }}>Cancel</button>
                                <button type="submit" onClick={checkPassword} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-navy)', color: 'white', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 500 }}>Enter</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };
        
        // Feedback Modal
        const FeedbackModal = ({ activity, onSubmit, onCancel }) => {
            const [feedback, setFeedback] = useState('');
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-lg)', zIndex: 1000 }}>
                    <div style={{ background: 'white', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', width: '100%', maxWidth: '400px' }}>
                        <h2 style={{ fontSize: '1.25rem', marginBottom: 'var(--space-sm)' }}>Feedback for {activity?.kidName}</h2>
                        <p style={{ color: 'var(--color-text-light)', fontSize: '0.9rem', marginBottom: 'var(--space-lg)' }}>"{activity?.title}"</p>
                        <textarea value={feedback} onChange={(e) => setFeedback(e.target.value)} placeholder="What changes would help?" rows={4} autoFocus style={{ width: '100%', padding: 'var(--space-md)', border: '2px solid var(--color-border)', borderRadius: 'var(--radius-md)', fontSize: '1rem', fontFamily: 'var(--font-body)', resize: 'vertical', marginBottom: 'var(--space-md)' }} />
                        <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                            <button onClick={onCancel} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-cream)', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 500 }}>Cancel</button>
                            <button onClick={() => onSubmit(feedback)} disabled={!feedback.trim()} style={{ flex: 1, padding: 'var(--space-md)', background: feedback.trim() ? 'var(--color-warning)' : 'var(--color-tan)', color: feedback.trim() ? 'white' : 'var(--color-text-light)', border: 'none', borderRadius: 'var(--radius-md)', cursor: feedback.trim() ? 'pointer' : 'not-allowed', fontWeight: 500 }}>Send</button>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Add Booking Modal
        const AddBookingModal = ({ onSubmit, onCancel }) => {
            const [title, setTitle] = useState('');
            const [city, setCity] = useState('');
            const [notes, setNotes] = useState('');
            const [link, setLink] = useState('');
            const canSubmit = title.trim().length > 0;
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-lg)', zIndex: 1000 }}>
                    <div style={{ background: 'white', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', width: '100%', maxWidth: '400px' }}>
                        <h2 style={{ fontSize: '1.25rem', marginBottom: 'var(--space-lg)' }}>🎟️ Add to Booking List</h2>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-md)' }}>
                            <div>
                                <label style={{ display: 'block', fontSize: '0.85rem', fontWeight: 600, marginBottom: '4px', color: 'var(--color-text-light)' }}>What needs booking <span style={{ color: 'var(--color-error)' }}>*</span></label>
                                <input value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Arena di Verona tickets" autoFocus style={{ width: '100%', padding: 'var(--space-md)', border: '2px solid var(--color-border)', borderRadius: 'var(--radius-md)', fontSize: '1rem', fontFamily: 'var(--font-body)', outline: 'none', boxSizing: 'border-box' }} onFocus={e => e.target.style.borderColor = 'var(--color-navy)'} onBlur={e => e.target.style.borderColor = 'var(--color-border)'} />
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '0.85rem', fontWeight: 600, marginBottom: '4px', color: 'var(--color-text-light)' }}>City</label>
                                <input value={city} onChange={e => setCity(e.target.value)} placeholder="e.g. Verona" style={{ width: '100%', padding: 'var(--space-md)', border: '2px solid var(--color-border)', borderRadius: 'var(--radius-md)', fontSize: '1rem', fontFamily: 'var(--font-body)', outline: 'none', boxSizing: 'border-box' }} onFocus={e => e.target.style.borderColor = 'var(--color-navy)'} onBlur={e => e.target.style.borderColor = 'var(--color-border)'} />
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '0.85rem', fontWeight: 600, marginBottom: '4px', color: 'var(--color-text-light)' }}>Notes</label>
                                <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Why it needs booking, best timing, etc." rows={2} style={{ width: '100%', padding: 'var(--space-md)', border: '2px solid var(--color-border)', borderRadius: 'var(--radius-md)', fontSize: '1rem', fontFamily: 'var(--font-body)', resize: 'none', outline: 'none', boxSizing: 'border-box' }} onFocus={e => e.target.style.borderColor = 'var(--color-navy)'} onBlur={e => e.target.style.borderColor = 'var(--color-border)'} />
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '0.85rem', fontWeight: 600, marginBottom: '4px', color: 'var(--color-text-light)' }}>Booking link</label>
                                <input value={link} onChange={e => setLink(e.target.value)} placeholder="https://..." style={{ width: '100%', padding: 'var(--space-md)', border: '2px solid var(--color-border)', borderRadius: 'var(--radius-md)', fontSize: '1rem', fontFamily: 'var(--font-body)', outline: 'none', boxSizing: 'border-box' }} onFocus={e => e.target.style.borderColor = 'var(--color-navy)'} onBlur={e => e.target.style.borderColor = 'var(--color-border)'} />
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 'var(--space-sm)', marginTop: 'var(--space-lg)' }}>
                            <button onClick={onCancel} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-cream)', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 500 }}>Cancel</button>
                            <button onClick={() => canSubmit && onSubmit({ title: title.trim(), city: city.trim(), notes: notes.trim(), link: link.trim() || null })} disabled={!canSubmit} style={{ flex: 1, padding: 'var(--space-md)', background: canSubmit ? 'var(--color-terracotta)' : 'var(--color-tan)', color: canSubmit ? 'white' : 'var(--color-text-light)', border: 'none', borderRadius: 'var(--radius-md)', cursor: canSubmit ? 'pointer' : 'not-allowed', fontWeight: 600 }}>Add to List</button>
                        </div>
                    </div>
                </div>
            );
        };


        // ============================================
        // FINGERPRINT MODAL
        // ============================================
        const FingerprintModal = ({ onSuccess, onCancel }) => {
            const [phase, setPhase] = React.useState('idle'); // idle | scanning | success

            const handleScan = () => {
                if (phase !== 'idle') return;
                setPhase('scanning');
                setTimeout(() => {
                    setPhase('success');
                    setTimeout(() => { onSuccess(); }, 900);
                }, 1800);
            };

            const phaseColor = phase === 'success' ? '#4CAF50' : phase === 'scanning' ? 'var(--color-gold)' : 'var(--color-navy)';
            const phaseLabel = phase === 'success' ? '✓ Identity confirmed' : phase === 'scanning' ? 'Scanning...' : 'Place finger on scanner';

            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-lg)', zIndex: 2000, animation: 'fadeIn 0.2s ease-out' }}>
                    <div style={{ background: '#0D1B2A', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', width: '100%', maxWidth: '340px', textAlign: 'center', border: '1px solid rgba(255,255,255,0.1)', boxShadow: '0 0 60px rgba(0,0,0,0.8)' }}>
                        <div style={{ fontSize: '0.7rem', fontWeight: 700, letterSpacing: '3px', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 'var(--space-lg)' }}>🔒 Secure Access Terminal</div>
                        
                        <div style={{ background: 'rgba(255,80,80,0.1)', border: '1px solid rgba(255,80,80,0.3)', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', marginBottom: 'var(--space-xl)', fontSize: '0.8rem', color: '#FF8A80', lineHeight: 1.5 }}>
                            ⚠️ Warning: Unrecognized fingerprints will lock this device for <strong>72 hours</strong> and notify authorities.
                        </div>

                        {/* Fingerprint scanner */}
                        <div onClick={handleScan} style={{ cursor: phase === 'idle' ? 'pointer' : 'default', display: 'inline-block', position: 'relative', marginBottom: 'var(--space-lg)' }}>
                            <svg width="120" height="120" viewBox="0 0 120 120" style={{ filter: phase === 'success' ? 'drop-shadow(0 0 12px #4CAF50)' : phase === 'scanning' ? 'drop-shadow(0 0 12px #D4A853)' : 'drop-shadow(0 0 6px rgba(30,58,95,0.8))', transition: 'filter 0.4s' }}>
                                {/* Fingerprint arcs */}
                                {[
                                    'M 60 95 Q 20 95 20 60 Q 20 25 60 25 Q 100 25 100 60 Q 100 78 88 88',
                                    'M 60 88 Q 28 88 28 60 Q 28 32 60 32 Q 92 32 92 60 Q 92 74 82 82',
                                    'M 60 81 Q 36 81 36 60 Q 36 39 60 39 Q 84 39 84 60 Q 84 70 76 76',
                                    'M 60 74 Q 44 74 44 60 Q 44 46 60 46 Q 76 46 76 60 Q 76 66 70 70',
                                    'M 60 67 Q 52 67 52 60 Q 52 53 60 53 Q 68 53 68 60 Q 68 62 65 64',
                                    'M 42 22 Q 60 14 78 22',
                                    'M 35 28 Q 60 16 85 28',
                                    'M 60 95 Q 38 97 24 82',
                                    'M 60 88 Q 42 91 30 78',
                                ].map((d, i) => (
                                    <path key={i} d={d} fill="none" stroke={phaseColor} strokeWidth="2.5" strokeLinecap="round"
                                        style={{ opacity: phase === 'scanning' ? 0 : 1, animation: phase === 'scanning' ? 'pulse 0.8s ease-in-out ' + (i * 0.1) + 's infinite' : 'none', transition: 'stroke 0.4s, opacity 0.3s' }} />
                                ))}
                                {/* Success checkmark overlay */}
                                {phase === 'success' && (
                                    <path d="M 38 60 L 52 74 L 82 44" fill="none" stroke="#4CAF50" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"
                                        style={{ animation: 'slideIn 0.3s ease-out' }} />
                                )}
                                {/* Outer ring */}
                                <circle cx="60" cy="60" r="56" fill="none" stroke={phaseColor} strokeWidth="1.5" strokeDasharray={phase === 'scanning' ? '8 4' : 'none'} style={{ opacity: 0.4, transition: 'stroke 0.4s', animation: phase === 'scanning' ? 'spin 2s linear infinite' : 'none' }} />
                            </svg>
                            {phase === 'idle' && (
                                <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', animation: 'pulse 2s ease-in-out infinite', background: 'radial-gradient(circle, rgba(30,58,95,0.15) 0%, transparent 70%)' }} />
                            )}
                        </div>

                        <div style={{ fontSize: '0.9rem', fontWeight: 600, color: phase === 'success' ? '#4CAF50' : phase === 'scanning' ? 'var(--color-gold)' : 'rgba(255,255,255,0.7)', marginBottom: 'var(--space-xl)', transition: 'color 0.4s', letterSpacing: '0.5px' }}>
                            {phaseLabel}
                        </div>

                        {phase === 'idle' && (
                            <button onClick={onCancel} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.3)', fontSize: '0.8rem', cursor: 'pointer', padding: 'var(--space-sm)' }}>
                                Cancel
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================
        // MAIN APP
        // ============================================
        const App = () => {
            const [screen, setScreen] = useState('home');
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showFingerprintModal, setShowFingerprintModal] = useState(false);
            const [feedbackActivity, setFeedbackActivity] = useState(null);
            const [showAddBooking, setShowAddBooking] = useState(false);
            const [previousScreen, setPreviousScreen] = useState('welcome');
            const store = useStore();
            
            const handleSelectUser = (userId) => { setCurrentUser(userId); setScreen('chat'); };
            const handleSelectMemories = (userId) => { setCurrentUser(userId); setScreen('memories'); };
            const handleBack = () => {
                if (screen === 'welcome') { setScreen('home'); }
                else if (screen === 'chat') { setScreen('welcome'); setCurrentUser(null); store.setRefiningIdea(null); }
                else if (screen === 'memories') { setScreen('welcome'); setCurrentUser(null); }
                else if (screen === 'dashboard') { setScreen(currentUser ? 'chat' : 'welcome'); }
                else if (screen === 'map') { setScreen(previousScreen); }
            };
            const handleOpenAdmin = () => setShowFingerprintModal(true);
            const handleOpenDashboard = () => setScreen('dashboard');
            const handleOpenMap = () => { setPreviousScreen(screen); setScreen('map'); };
            const handleFingerprintSuccess = () => { setShowFingerprintModal(false); setIsAdmin(true); setScreen('dashboard'); };
            const handleApprove = (id) => store.approveActivity(id);
            const handleFeedback = (id) => setFeedbackActivity(store.activities.find(a => a.id === id));
            const handleSubmitFeedback = async (feedback) => { if (feedbackActivity) await store.updateActivity(feedbackActivity.id, { status: 'needs-revision', parentFeedback: feedback }); setFeedbackActivity(null); };
            
            const handleToggleBooked = (id) => store.toggleBookingStatus(id);
            const handleDeleteBooking = (id) => { if (confirm('Remove this booking item?')) store.deleteBookingItem(id); };
            const handleAddBooking = () => setShowAddBooking(true);
            const handleSubmitManualBooking = async (item) => { await store.addBookingItem(item); setShowAddBooking(false); };

            const handleRefineIdea = (idea) => {
                store.setRefiningIdea(idea);
                setCurrentUser(idea.kidId);
                setScreen('chat');
            };
            const handleSubmitIdea = async (ideaId) => {
                const activity = await store.convertIdeaToActivity(ideaId);
                if (activity) { alert('"' + activity.title + '" has been submitted for parent review!'); }
            };
            const handleDeleteIdea = (ideaId) => {
                if (confirm('Delete this saved idea?')) store.deleteSavedIdea(ideaId);
            };
            
            return (
                <div style={{ height: '100%' }}>
                    {screen === 'home' && <HomeScreen onExplorer={() => setScreen('welcome')} onFollowAlong={() => setScreen('tracker')} />}
                    {screen === 'welcome' && <WelcomeScreen onSelectUser={handleSelectUser} onSelectMemories={handleSelectMemories} userProfiles={store.userProfiles} activities={store.activities} onOpenAdmin={handleOpenAdmin} onOpenDashboard={handleOpenDashboard} onOpenMap={handleOpenMap} onBack={handleBack} />}
                    {screen === 'chat' && currentUser && <ChatScreen userId={currentUser} user={store.userProfiles[currentUser]} onBack={handleBack} onOpenDashboard={handleOpenDashboard} onOpenMap={handleOpenMap} store={store} />}
                    {screen === 'memories' && currentUser && <MemoriesScreen userId={currentUser} user={store.userProfiles[currentUser]} itinerary={store.itinerary} journalEntries={store.journalEntries} onAddEntry={store.addJournalEntry} onBack={handleBack} />}
                    {screen === 'dashboard' && <DashboardScreen onBack={handleBack} activities={store.activities} savedIdeas={store.savedIdeas} bookingItems={store.bookingItems} userProfiles={store.userProfiles} isAdmin={isAdmin} currentUserId={currentUser} onApprove={handleApprove} onFeedback={handleFeedback} onRefineIdea={handleRefineIdea} onSubmitIdea={handleSubmitIdea} onDeleteIdea={handleDeleteIdea} onToggleBooked={handleToggleBooked} onDeleteBooking={handleDeleteBooking} onAddBooking={handleAddBooking} />}
                    {screen === 'map' && <MapScreen onBack={handleBack} activities={store.activities} userProfiles={store.userProfiles} itinerary={store.itinerary} />}
                    {screen === 'tracker' && <TrackerScreen onBack={() => setScreen('home')} activities={store.activities} itinerary={store.itinerary} journalEntries={store.journalEntries} onHeartEntry={store.heartJournalEntry} />}
                    {showFingerprintModal && <FingerprintModal onSuccess={handleFingerprintSuccess} onCancel={() => setShowFingerprintModal(false)} />}
                    {feedbackActivity && <FeedbackModal activity={feedbackActivity} onSubmit={handleSubmitFeedback} onCancel={() => setFeedbackActivity(null)} />}
                    {showAddBooking && <AddBookingModal onSubmit={handleSubmitManualBooking} onCancel={() => setShowAddBooking(false)} />}
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
