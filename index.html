        // Token management
        const TokenManager = {
            getToken() {
                const saved = localStorage.getItem('euroPlanner_googleToken');
                if (!saved) return null;
                try {
                    const token = JSON.parse(saved);
                    // Check if token is expired (with 5 min buffer)
                    if (token.expires_at && Date.now() > token.expires_at - 300000) {
                        this.clearToken();
                        return null;
                    }
                    return token.access_token;
                } catch {
                    return null;
                }
            },
            
            setToken(tokenResponse) {
                const tokenData = {
                    access_token: tokenResponse.access_token,
                    expires_at: Date.now() + (tokenResponse.expires_in * 1000)
                };
                localStorage.setItem('euroPlanner_googleToken', JSON.stringify(tokenData));
            },
            
            clearToken() {
                localStorage.removeItem('euroPlanner_googleToken');
            },
            
            isSignedIn() {
                return !!this.getToken();
            }
        };
        
        // Google Sign-In using popup
        const GoogleAuth = {
            signIn() {
                return new Promise((resolve, reject) => {
                    const width = 500;
                    const height = 600;
                    const left = window.screenX + (window.outerWidth - width) / 2;
                    const top = window.screenY + (window.outerHeight - height) / 2;
                    
                    // Create OAuth URL
                    const params = new URLSearchParams({
                        client_id: GOOGLE_CLIENT_ID,
                        redirect_uri: window.location.origin + window.location.pathname,
                        response_type: 'token',
                        scope: GOOGLE_SCOPES,
                        include_granted_scopes: 'true',
                        state: 'europlanner'
                    });
                    
                    const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
                    
                    // Open popup
                    const popup = window.open(
                        authUrl,
                        'Google Sign In',
                        `width=${width},height=${height},left=${left},top=${top}`
                    );
                    
                    // Listen for the redirect with token
                    const checkPopup = setInterval(() => {
                        try {
                            if (popup.closed) {
                                clearInterval(checkPopup);
                                reject(new Error('Popup closed'));
                                return;
                            }
                            
                            // Check if we're back on our domain with a token
                            if (popup.location.href.includes(window.location.origin)) {
                                const hash = popup.location.hash.substring(1);
                                const params = new URLSearchParams(hash);
                                const accessToken = params.get('access_token');
                                const expiresIn = params.get('expires_in');
                                
                                if (accessToken) {
                                    TokenManager.setToken({
                                        access_token: accessToken,
                                        expires_in: parseInt(expiresIn) || 3600
                                    });
                                    popup.close();
                                    clearInterval(checkPopup);
                                    resolve(accessToken);
                                }
                            }
                        } catch (e) {
                            // Cross-origin error - popup is still on Google's domain
                        }
                    }, 500);
                    
                    // Timeout after 2 minutes
                    setTimeout(() => {
                        clearInterval(checkPopup);
                        if (!popup.closed) popup.close();
                        reject(new Error('Sign in timeout'));
                    }, 120000);
                });
            },
            
            signOut() {
                TokenManager.clearToken();
            }
        };
        
        const SheetsAPI = {
            baseUrl: `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}`,
            
            // Get authorization header
            getAuthHeader() {
                const token = TokenManager.getToken();
                if (token) {
                    return { 'Authorization': `Bearer ${token}` };
                }
                return {};
            },
            
            // Read data from a sheet (works with API key or OAuth)
            async read(sheetName, range = '') {
                const fullRange = range ? `${sheetName}!${range}` : sheetName;
                const token = TokenManager.getToken();
                
                // Use OAuth token if available, otherwise API key
                let url = `${this.baseUrl}/values/${encodeURIComponent(fullRange)}`;
                if (!token) {
                    url += `?key=${CONFIG.GOOGLE_API_KEY}`;
                }
                
                try {
                    const response = await fetch(url, {
                        headers: token ? this.getAuthHeader() : {}
                    });
                    if (!response.ok) throw new Error(`Sheets API error: ${response.status}`);
                    const data = await response.json();
                    return data.values || [];
                } catch (error) {
                    console.error('Error reading from Sheets:', error);
                    return null;
                }
            },
            
            // Write data to a sheet (requires OAuth)
            async append(sheetName, values) {
                const token = TokenManager.getToken();
                if (!token) {
                    console.warn('Cannot write to Sheets - not signed in with Google');
                    console.log('To sync activities: Sign in with Google on the Welcome screen');
                    return null;
                }
                
                const url = `${this.baseUrl}/values/${encodeURIComponent(sheetName)}:append?valueInputOption=USER_ENTERED`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...this.getAuthHeader()
                        },
                        body: JSON.stringify({ values: [values] })
                    });
                    if (!response.ok) {
                        const error = await response.json();
                        console.error('Sheets API Error Details:', error);
                        if (response.status === 401 || response.status === 403) {
                            console.warn('Google token may be expired - user should sign in again');
                            TokenManager.clearToken();
                        }
                        throw new Error(`Sheets API error: ${response.status} - ${JSON.stringify(error)}`);
                    }
                    console.log('✅ Successfully synced to Google Sheets');
                    return await response.json();
                } catch (error) {
                    console.error('Error appending to Sheets:', error);
                    return null;
                }
            },
            
            // Update a specific range (requires OAuth)
            async update(sheetName, range, values) {
                const token = TokenManager.getToken();
                if (!token) {
                    console.warn('Cannot write to Sheets - not signed in');
                    return null;
                }
                
                const fullRange = `${sheetName}!${range}`;
                const url = `${this.baseUrl}/values/${encodeURIComponent(fullRange)}?valueInputOption=USER_ENTERED`;
                try {
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            ...this.getAuthHeader()
                        },
                        body: JSON.stringify({ values })
                    });
                    if (!response.ok) throw new Error(`Sheets API error: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    console.error('Error updating Sheets:', error);
                    return null;
                }
            },
            
            // Parse activities from sheet data
            parseActivities(rows) {
                if (!rows || rows.length < 2) return [];
                return rows.slice(1).filter(row => row[0]).map(row => ({
                    id: row[0] || '',
                    kidId: (row[1] || '').toLowerCase(),
                    kidName: row[1] || '',
                    title: row[2] || '',
                    city: row[3] || '',
                    description: row[4] || '',
                    estimatedCost: parseFloat(row[5]) || 0,
                    travelMethod: row[6] || '',
                    travelTime: row[7] || '',
                    duration: row[8] || '',
                    otherConsiderations: row[9] || '',
                    status: (row[10] || 'draft').toLowerCase().replace(' ', '-'),
                    dateSubmitted: row[11] || '',
                    parentFeedback: row[12] || '',
                    dateUpdated: row[13] || '',
                    syncedToSheets: true
                }));
            },
            
            // Parse user profiles from sheet data
            parseUserProfiles(rows) {
                if (!rows || rows.length < 2) return null;
                const profiles = {};
                const emojiMap = { abby: '⚽', tyler: '🏈', ryan: '👨‍🍳', mom: '🧜‍♀️' };
                const colorMap = { abby: '#D64F8A', tyler: '#C0392B', ryan: '#2E6DA4', mom: '#2E8B57' };
                rows.slice(1).filter(row => row[0]).forEach(row => {
                    const name = row[0];
                    const id = name.toLowerCase();
                    profiles[id] = {
                        name: name,
                        age: parseInt(row[1]) || 11,
                        interests: (row[2] || '').split(',').map(s => s.trim()).filter(Boolean),
                        preferences: row[3] || '',
                        budgetTotal: parseFloat(row[4]) || 1000,
                        budgetRemaining: parseFloat(row[5]) || 1000,
                        approvedActivities: parseInt(row[6]) || 0,
                        phrasesLearned: parseInt(row[7]) || 0,
                        emoji: emojiMap[id] || '👤',
                        color: colorMap[id] || '#666666',
                        isParent: id === 'ryan' || id === 'mom'
                    };
                });
                return profiles;
            },
            
            // Parse itinerary from sheet data
            parseItinerary(rows) {
                if (!rows || rows.length < 2) return null;
                const cityCoords = {
                    'florence': { lat: 43.7696, lng: 11.2558 },
                    'rome': { lat: 41.9028, lng: 12.4964 },
                    'paris': { lat: 48.8566, lng: 2.3522 },
                    'venice': { lat: 45.4408, lng: 12.3155 },
                    'milan': { lat: 45.4642, lng: 9.1900 },
                    'barcelona': { lat: 41.3851, lng: 2.1734 },
                    'amsterdam': { lat: 52.3676, lng: 4.9041 },
                    'london': { lat: 51.5074, lng: -0.1278 },
                    'frankfurt': { lat: 50.1109, lng: 8.6821 },
                    'iseltwald': { lat: 46.7167, lng: 7.9667 },
                    'basel': { lat: 47.5596, lng: 7.5886 },
                    'lucerne': { lat: 47.0502, lng: 8.3093 },
                    'bern': { lat: 46.9480, lng: 7.4474 },
                    'riomaggiore': { lat: 44.0961, lng: 9.7378 },
                    'noce': { lat: 43.0833, lng: 11.7833 },
                    'cinque terre': { lat: 44.1461, lng: 9.6439 },
                    'lake garda': { lat: 45.6500, lng: 10.6333 },
                    'dolomites': { lat: 46.4102, lng: 11.8440 },
                    'ortisei': { lat: 46.5744, lng: 11.6717 },
                    'innbrücke': { lat: 47.2800, lng: 11.4500 },
                    'innsbruck': { lat: 47.2692, lng: 11.4041 },
                    'ampass': { lat: 47.2667, lng: 11.4667 },
                    'train day - kids choice': { lat: 46.0, lng: 9.0 }
                };
                const countryLanguages = {
                    'italy': 'Italian',
                    'france': 'French',
                    'spain': 'Spanish',
                    'netherlands': 'Dutch',
                    'uk': 'English',
                    'england': 'English',
                    'germany': 'German',
                    'switzerland': 'German',
                    'austria': 'German',
                    'switzerland/italy': 'Italian'
                };
                
                let transferCount = 0;
                
                return rows.slice(1).filter(row => row[0]).map((row, index, allRows) => {
                    const city = row[0];
                    const country = row[1] || '';
                    const cityLower = city.toLowerCase();
                    
                    const isTransfer = cityLower.includes('transfer') || cityLower.includes('kids choice');
                    
                    let coords;
                    if (isTransfer) {
                        const prevCity = index > 0 ? allRows[index - 1][0].toLowerCase() : null;
                        const nextCity = index < allRows.length - 1 ? allRows[index + 1][0].toLowerCase() : null;
                        
                        const prevCoords = prevCity && cityCoords[prevCity] ? cityCoords[prevCity] : { lat: 48, lng: 8 };
                        const nextCoords = nextCity && cityCoords[nextCity] ? cityCoords[nextCity] : { lat: 46, lng: 10 };
                        
                        coords = {
                            lat: (prevCoords.lat + nextCoords.lat) / 2,
                            lng: (prevCoords.lng + nextCoords.lng) / 2
                        };
                        transferCount++;
                    } else {
                        coords = cityCoords[cityLower] || { lat: 45, lng: 10 };
                    }
                    
                    return {
                        city,
                        country,
                        startDate: row[2] || '',
                        endDate: row[3] || '',
                        accommodation: row[4] || 'TBD',
                        address: row[5] || '',
                        transport: row[6] || '',
                        notes: row[7] || '',
                        lat: coords.lat,
                        lng: coords.lng,
                        language: countryLanguages[country.toLowerCase()] || 'English',
                        isTransfer: isTransfer
                    };
                });
            },
            
            // Convert activity to row format for sheets
            activityToRow(activity) {
                return [
                    activity.id,
                    activity.kidName,
                    activity.title,
                    activity.city,
                    activity.description,
                    activity.estimatedCost,
                    activity.travelMethod,
                    activity.travelTime,
                    activity.duration,
                    activity.otherConsiderations,
                    activity.status.charAt(0).toUpperCase() + activity.status.slice(1).replace('-', ' '),
                    activity.dateSubmitted,
                    activity.parentFeedback || '',
                    activity.dateUpdated || activity.dateSubmitted
                ];
            }
        };

            const addActivity = async (activity) => {
                const newActivity = {

                    dateUpdated: new Date().toISOString().split('T')[0],

                if (isSignedIn) {

            // Flush any locally-saved unsynced activities to Sheets

            const syncUnsyncedActivities = async (currentActivities) => {
                const unsynced = (currentActivities || []).filter(a => !a.syncedToSheets && !a.isSample);
                if (unsynced.length === 0) return 0;
                
                // Fetch existing rows from Sheet for dedup
                let existingIds = new Set();
                let existingTitleKeys = new Set(); // "kidname|title" fallback
                try {
                    const sheetsData = await SheetsAPI.read(CONFIG.SHEET_NAMES.activities);
                    if (sheetsData && sheetsData.length > 1) {
                        sheetsData.slice(1).forEach(row => {
                            if (row[0]) existingIds.add(row[0]);
                            if (row[1] && row[2]) existingTitleKeys.add(row[1].toLowerCase() + '|' + row[2].toLowerCase());
                        });
                    }
                } catch (e) {
                    console.warn('Could not fetch existing IDs for dedup check:', e);

                console.log('Dedup: ' + existingIds.size + ' IDs, ' + existingTitleKeys.size + ' title keys in Sheet');
                console.log('Attempting to sync ' + unsynced.length + ' local activities');
                
                let synced = 0;
                let skipped = 0;
                for (const activity of unsynced) {
                    const titleKey = activity.kidName.toLowerCase() + '|' + activity.title.toLowerCase();
                    if (existingIds.has(activity.id) || existingTitleKeys.has(titleKey)) {
                        setActivities(prev => prev.map(a => a.id === activity.id ? { ...a, syncedToSheets: true } : a));
                        console.log('Skipped duplicate:', activity.title);
                        skipped++;
                        continue;

                    try {
                        await SheetsAPI.append(CONFIG.SHEET_NAMES.activities, SheetsAPI.activityToRow(activity));

                        console.error('Failed to sync activity:', activity.title, error);

            try {
                const response = await fetch('https://europlanner-api.wilcoxson-ryan.workers.dev', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: CONFIG.CLAUDE_MODEL,
                        max_tokens: 1024,
                        system: systemPrompt,
                        messages: messages.map(m => ({ role: m.isUser ? 'user' : 'assistant', content: m.text }))
                    })
                });
                
                if (!response.ok) {
                    let errorDetail = '';
                    try {
                        const errorData = await response.json();
                        errorDetail = JSON.stringify(errorData);
                        console.error('API Error Details:', errorData);
                    } catch (e) {
                        errorDetail = await response.text();
                    }
                    throw new Error(`API error ${response.status}: ${errorDetail}`);
                }
                
                const data = await response.json();
                
                // Log full response shape for debugging
                console.log('API response stop_reason:', data.stop_reason);
                console.log('API response content types:', data.content?.map(b => b.type));

                // Guard: API may return an error object instead of content array
                if (!data || !data.content || !Array.isArray(data.content)) {
                    console.error('Unexpected API response structure:', JSON.stringify(data));
                    // Surface the real error message if present
                    const msg = data?.error?.message || data?.message || JSON.stringify(data);
                    return `Something went wrong with the AI connection: ${msg}`;
                }

                // Extract text blocks only — web search adds tool_use / tool_result blocks
                const textBlocks = data.content.filter(block => block.type === 'text');
                
                if (textBlocks.length === 0) {
                    console.error('No text blocks in response. Full content:', JSON.stringify(data.content));
                    return `I got a response but couldn't read it (no text blocks). Check the browser console for details.`;
                }
                
                return textBlocks.map(block => block.text).join('');

            } catch (error) {
                console.error('Claude API error:', error);
                if (error.message.includes('401')) {
                    return `Authentication issue with the AI. (Error: 401 Unauthorized)`;
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    return `Can't reach the AI right now. Check your internet connection and try again.`;
                }
                return `Connection error: ${error.message}`;
            }

        // Chat Screen
        const ChatScreen = ({ userId, user, onBack, onOpenDashboard, onOpenMap, store }) => {
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [started, setStarted] = useState(false);
            const [sessionActivities, setSessionActivities] = useState([]);
            const [showResumePrompt, setShowResumePrompt] = useState(false);
            const [previousSummary, setPreviousSummary] = useState(null);
            const [pendingActivity, setPendingActivity] = useState(null);
            const messagesEndRef = useRef(null);
            const idleTimerRef = useRef(null);
            
            const messagesRef = useRef(messages);
            const sessionActivitiesRef = useRef(sessionActivities);
            useEffect(() => { messagesRef.current = messages; }, [messages]);
            useEffect(() => { sessionActivitiesRef.current = sessionActivities; }, [sessionActivities]);
            
            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, pendingActivity]);
            
            const resetIdleTimer = () => {
                store.updateLastActivity(userId);
                if (idleTimerRef.current) clearTimeout(idleTimerRef.current);
                idleTimerRef.current = setTimeout(() => {
                    saveSessionToSheets('idle');
                }, 15 * 60 * 1000);
            };
            
            const saveSessionToSheets = (reason) => {
                const currentMessages = messagesRef.current;
                const currentActivities = sessionActivitiesRef.current;
                const userMessages = currentMessages.filter(m => m.isUser);
                if (userMessages.length === 0) return;
                
                const topics = userMessages.map(m => m.text).slice(-5);
                const activitiesSubmitted = currentActivities.map(a => `${a.title} in ${a.city}`);
                const recentContext = currentMessages.slice(-4).map(m =>
                    m.isUser ? `You asked: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                             : `We discussed: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                );
                
                const summary = { topics, activitiesSubmitted, recentContext, messageCount: currentMessages.length };
                store.saveSessionSummary(userId, summary);
                store.saveConversationSummaryToSheets(userId, {
                    topics: `[${reason}] ` + topics.join(', '),
                    ideas: activitiesSubmitted.join(', '),
                    notes: recentContext.join(' | ')
                }).catch(err => console.log('Sheets save error:', err));
            };
            
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'hidden') {
                        saveSessionToSheets('visibility-hidden');
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (idleTimerRef.current) clearTimeout(idleTimerRef.current);
                    saveSessionToSheets('unmount');
                };
            }, []);
            
            const sendActivityEmail = async (activity) => {
                const profile = store.userProfiles[userId];
                const budgetText = `$${profile?.budgetRemaining?.toFixed(0) || 1000} remaining of $${profile?.budgetTotal || 1000}`;
                
                await EmailService.sendDigestToBothParents(
                    user.name,
                    `Submitted a new activity for review!`,
                    `• ${activity.title} in ${activity.city} (€${activity.estimatedCost})\n\n${activity.description}`,
                    budgetText
                );
            };
            
            const generateSessionSummary = () => {
                const userMessages = messagesRef.current.filter(m => m.isUser);
                if (userMessages.length === 0) return null;
                const topics = userMessages.map(m => m.text).slice(-5);
                const activitiesSubmitted = sessionActivitiesRef.current.map(a => `${a.title} in ${a.city}`);
                const recentContext = messagesRef.current.slice(-4).map(m =>
                    m.isUser ? `You asked: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                             : `We discussed: "${m.text.substring(0, 100)}${m.text.length > 100 ? '...' : ''}"`
                );
                return { topics, activitiesSubmitted, recentContext, messageCount: messagesRef.current.length };
            };
            
            const handleSessionEnd = (reason) => {
                saveSessionToSheets(reason);
                
                const summary = generateSessionSummary();
                if (summary) {
                    const profile = store.userProfiles[userId];
                    const budgetText = `$${profile?.budgetRemaining?.toFixed(0) || 1000} remaining of $${profile?.budgetTotal || 1000}`;
                    const topicsText = summary.topics.join('\n• ');
                    const activitiesText = summary.activitiesSubmitted.length > 0
                        ? summary.activitiesSubmitted.map(a => `• ${a}`).join('\n')
                        : 'No new activities submitted this session';
                    EmailService.sendDigestToBothParents(
                        user.name,
                        `Topics discussed:\n• ${topicsText}`,
                        activitiesText,
                        budgetText
                    ).catch(err => console.log('Email send error:', err));
                }
                
                if (reason === 'back') onBack();
            };
            
            const handleBack = () => {
                handleSessionEnd('back');
            };
            
            const handleResume = () => {
                setShowResumePrompt(false);
                store.clearSessionSummary(userId);
                
                const summaryText = previousSummary.recentContext.join('\n');
                const resumeMsg = { id: Date.now(), text: `Last time we chatted, here's what we covered:\n\n${summaryText}\n\nWant to pick up where we left off, or explore something new?`, isUser: false };
                setMessages([resumeMsg]);
                resetIdleTimer();
            };
            
            const handleStartFresh = () => {
                setShowResumePrompt(false);
                store.clearSessionSummary(userId);
                
                const cities = (store.itinerary || CONFIG.itinerary).map(i => i.city).join(', ');
                const freshMsg = { id: Date.now(), text: `Hey ${user.name}! 👋 Fresh start! Ready to plan some adventures for Europe?\n\nWe can explore ideas for ${cities}. What sounds fun to you?`, isUser: false };
                setMessages([freshMsg]);
                resetIdleTimer();
            };
            
            useEffect(() => {
                if (!started) {
                    setStarted(true);
                    
                    const existingSummary = store.getSessionSummary(userId);
                    const sessionExpired = store.isSessionExpired(userId);
                    
                    const needsRevision = store.activities.filter(a => 
                        a.kidId === userId && a.status === 'needs-revision' && !a.isSample
                    );
                    
                    const refiningIdea = store.refiningIdea;
                    
                    setIsLoading(true);
                    setTimeout(async () => {
                        const cities = (store.itinerary || CONFIG.itinerary).map(i => i.city).join(', ');
                        
                        if (refiningIdea && refiningIdea.kidId === userId) {
                            const ideaDetails = refiningIdea.notes ? `\n\nHere's what we had:\n• **${refiningIdea.title}** in ${refiningIdea.city}\n• Notes: ${refiningIdea.notes}${refiningIdea.estimatedCost ? `\n• Estimated cost: ~€${refiningIdea.estimatedCost}` : ''}` : '';
                            const greeting = `Hey ${user.name}! 👋 You wanted to revisit your saved idea for **${refiningIdea.title}**.${ideaDetails}\n\nWhat would you like to explore or change about this idea? We can dig into more details, adjust the plan, or get it ready to submit!`;
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                            store.clearSessionSummary(userId);
                            store.setRefiningIdea(null);
                        } else if (needsRevision.length > 0) {
                            const feedbackItems = needsRevision.map(a => 
                                `**${a.title}**: "${a.parentFeedback}"`
                            ).join('\n\n');
                            const greeting = `Hey ${user.name}! 👋 Quick heads up - your parents left some feedback on ${needsRevision.length === 1 ? 'an activity' : 'some activities'}:\n\n${feedbackItems}\n\nWant to work on revising ${needsRevision.length === 1 ? 'it' : 'one of them'}, or explore something new?`;
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                            store.clearSessionSummary(userId);
                        } else if (existingSummary) {
                            setPreviousSummary(existingSummary.summary);
                            setShowResumePrompt(true);
                        } else if (user.isParent) {
                            // Parent opening: status snapshot + open conversation
                            const allActivities = store.activities.filter(a => !a.isSample);
                            const abbyApproved = allActivities.filter(a => a.kidId === 'abby' && a.status === 'approved').length;
                            const abbyPending = allActivities.filter(a => a.kidId === 'abby' && a.status === 'submitted').length;
                            const tylerApproved = allActivities.filter(a => a.kidId === 'tyler' && a.status === 'approved').length;
                            const tylerPending = allActivities.filter(a => a.kidId === 'tyler' && a.status === 'submitted').length;
                            const deadlineDays = Math.ceil((new Date('2026-05-11') - new Date()) / (1000 * 60 * 60 * 24));
                            
                            const statusLines = [
                                '⚽ **Abby:** ' + abbyApproved + '/3 approved' + (abbyPending > 0 ? ', ' + abbyPending + ' waiting on you' : ' ✓'),
                                '🏈 **Tyler:** ' + tylerApproved + '/3 approved' + (tylerPending > 0 ? ', ' + tylerPending + ' waiting on you' : ' ✓'),
                                '📅 **Deadline:** May 11 (' + deadlineDays + ' days away)'
                            ].join('\n');
                            
                            const greeting = 'Hey ' + user.name + '! 👋 Here\'s where things stand:\n\n' + statusLines + '\n\nWhat do you want to work on? I can help with logistics, train routes, reviewing submitted activities, the booking list — whatever\'s on your mind.';
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                        } else {
                            const greeting = 'Hey ' + user.name + '! 👋 Ready to plan some adventures for Europe?\n\nWe can explore ideas for ' + cities + '. What sounds fun to you?';
                            const msg = { id: Date.now(), text: greeting, isUser: false };
                            setMessages([msg]);
                        }
                        
                        setIsLoading(false);
                        resetIdleTimer();
                    }, 500);
                }
            }, [started, userId, user.name, store]);
            
            const parseActivitySubmission = (text) => {
                const match = text.match(/\[SUBMIT_ACTIVITY\]([\s\S]*?)\[\/SUBMIT_ACTIVITY\]/);
                if (!match) return null;
                
                const content = match[1];
                const getValue = (field) => {
                    const regex = new RegExp(`${field}:\\s*(.+?)(?:\\n|$)`, 'i');
                    const m = content.match(regex);
                    return m ? m[1].trim() : '';
                };
                
                return {
                    title: getValue('Title'),
                    city: getValue('City'),
                    description: getValue('Description'),
                    estimatedCost: parseFloat(getValue('Cost')) || 0,
                    travelMethod: getValue('Travel Method'),
                    travelTime: getValue('Travel Time'),
                    duration: getValue('Duration'),
                    otherConsiderations: getValue('Considerations'),
                    conflictNote: getValue('ConflictNote') || null
                };
            };
            
            const parseIdeaSave = (text) => {
                const match = text.match(/\[SAVE_IDEA\]([\s\S]*?)\[\/SAVE_IDEA\]/);
                if (!match) return null;
                
                const content = match[1];
                const getValue = (field) => {
                    const regex = new RegExp(`${field}:\\s*(.+?)(?:\\n|$)`, 'i');
                    const m = content.match(regex);
                    return m ? m[1].trim() : '';
                };
                
                return {
                    title: getValue('Title'),
                    city: getValue('City'),
                    notes: getValue('Notes'),
                    estimatedCost: parseFloat(getValue('Cost')) || 0
                };
            };
            
            const parseBookingSave = (text) => {
                const match = text.match(/\[ADD_BOOKING\]([\s\S]*?)\[\/ADD_BOOKING\]/);
                if (!match) return null;
                const content = match[1];
                const getValue = (field) => {
                    const regex = new RegExp(field + ':\\s*(.+?)(?:\\n|$)', 'i');
                    const m = content.match(regex);
                    return m ? m[1].trim() : '';
                };
                return {
                    title: getValue('Title'),
                    city: getValue('City'),
                    notes: getValue('Notes'),
                    link: getValue('Link') || null
                };
            };

            const cleanResponseForDisplay = (text) => {
                return text
                    .replace(/\[SUBMIT_ACTIVITY\][\s\S]*?\[\/SUBMIT_ACTIVITY\]/g, '')
                    .replace(/\[SAVE_IDEA\][\s\S]*?\[\/SAVE_IDEA\]/g, '')
                    .replace(/\[ADD_BOOKING\][\s\S]*?\[\/ADD_BOOKING\]/g, '')
                    .trim();
            };
            
            const sendMessage = async (overrideText) => {
                const text = typeof overrideText === 'string' ? overrideText : inputValue;
                if (!text.trim() || isLoading) return;
                resetIdleTimer();
                
                const userMsg = { id: Date.now(), text: text.trim(), isUser: true };
                setMessages(prev => [...prev, userMsg]);
                setInputValue('');
                setIsLoading(true);
                
                const systemPrompt = generateSystemPrompt(user, userId, store.activities, store.itinerary);
                const response = await callClaudeAPI([...messages, userMsg], systemPrompt);
                
                // Guard: if response is null/undefined, show error and bail
                if (!response) {
                    console.error("callClaudeAPI returned null/undefined");
                    setMessages(prev => [...prev, { id: Date.now() + 1, text: "Sorry, something went wrong. Please try again.", isUser: false }]);
                    setIsLoading(false);
                    return;
                }

                
                const activityData = parseActivitySubmission(response);
                
                if (activityData && activityData.title) {
                    console.log('Activity detected - showing confirmation:', activityData.title);
                    setPendingActivity({
                        ...activityData,
                        kidId: userId,
                        kidName: user.name
                    });
                }
                
                const ideaData = parseIdeaSave(response);
                
                if (ideaData && ideaData.title) {
                    console.log('Idea detected - saving:', ideaData.title);
                    store.addSavedIdea({
                        ...ideaData,
                        kidId: userId,
                        kidName: user.name
                    });
                }

                const bookingData = parseBookingSave(response);
                if (bookingData && bookingData.title) {
                    console.log('Booking item detected - saving:', bookingData.title);
                    store.addBookingItem(bookingData);
                }
                
                const displayResponse = cleanResponseForDisplay(response);
                
                const assistantMsg = { id: Date.now() + 1, text: displayResponse, isUser: false };
                setMessages(prev => [...prev, assistantMsg]);
                setIsLoading(false);
            };
            
            const handleConfirmActivity = async () => {
                if (!pendingActivity) return;
                
                console.log('✅ User confirmed activity submission:', pendingActivity.title);
                const newActivity = await store.addActivity(pendingActivity);
                console.log('Activity submitted:', newActivity);
                
                setSessionActivities(prev => [...prev, newActivity]);
                await sendActivityEmail(newActivity);
                setPendingActivity(null);
                
                const confirmMsg = { 
                    id: Date.now(), 
                    text: `✅ **${newActivity.title}** has been submitted for parent review! You can check its status in the Dashboard.`, 
                    isUser: false 
                };
                setMessages(prev => [...prev, confirmMsg]);
            };
            
            const handleKeepPlanning = () => {
                console.log('User chose to keep planning, dismissing confirmation card');
                setPendingActivity(null);
            };
            
            return (
                <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--color-cream)' }}>
                    <header style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-sm)', padding: 'var(--space-sm) var(--space-md)', paddingTop: 'calc(var(--space-sm) + env(safe-area-inset-top, 0px))', background: 'white', borderBottom: '1px solid var(--color-border)', minHeight: '60px' }}>
                        <button onClick={handleBack} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}>
                            <Icon name="ArrowLeft" size={20} />
                        </button>
                        <div style={{ width: '36px', height: '36px', borderRadius: 'var(--radius-sm)', background: user.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '18px' }}>{user.emoji}</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 600, fontSize: '1rem' }}>{user.name}'s Planning</div>
                            <div style={{ fontSize: '0.8rem', color: 'var(--color-text-light)' }}>${store.userProfiles[userId]?.budgetRemaining?.toFixed(0) || user.budgetRemaining} left</div>
                        </div>
                        <button onClick={onOpenMap} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}>
                            <Icon name="Map" size={20} />
                        </button>
                        <button onClick={onOpenDashboard} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}>
                            <Icon name="List" size={20} />
                        </button>
                    </header>
                    
                    {/* Resume prompt overlay */}
                    {showResumePrompt && (
                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 'var(--space-xl)', background: 'var(--color-cream)' }}>
                            <div style={{ background: 'white', borderRadius: 'var(--radius-lg)', padding: 'var(--space-xl)', maxWidth: '400px', width: '100%', boxShadow: 'var(--shadow-lg)', textAlign: 'center' }}>
                                <div style={{ fontSize: '48px', marginBottom: 'var(--space-md)' }}>👋</div>
                                <h2 style={{ fontSize: '1.25rem', fontWeight: 600, marginBottom: 'var(--space-sm)' }}>Welcome back, {user.name}!</h2>
                                <p style={{ color: 'var(--color-text-light)', marginBottom: 'var(--space-lg)', fontSize: '0.95rem' }}>
                                    You had a planning session on {previousSummary?.date || 'recently'}. Want to pick up where you left off?
                                </p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-sm)' }}>
                                    <button onClick={handleResume} style={{ padding: 'var(--space-md)', background: user.color, color: 'white', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '1rem', fontWeight: 500 }}>
                                        Continue where I left off
                                    </button>
                                    <button onClick={handleStartFresh} style={{ padding: 'var(--space-md)', background: 'var(--color-cream)', color: 'var(--color-text)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '1rem', fontWeight: 500 }}>
                                        Start fresh
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Regular chat view */}
                    {!showResumePrompt && (
                        <>
                            <div style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-md)' }}>
                                {messages.map(msg => <ChatMessage key={msg.id} message={msg.text} isUser={msg.isUser} />)}
                                {isLoading && <ChatMessage isTyping />}
                                
                                {/* Activity Confirmation Card */}
                                {pendingActivity && (
                                    <div style={{ 
                                        background: 'linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%)', 
                                        borderRadius: 'var(--radius-lg)', 
                                        padding: 'var(--space-lg)', 
                                        marginTop: 'var(--space-md)',
                                        border: '2px solid var(--color-success)',
                                        boxShadow: 'var(--shadow-md)'
                                    }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-sm)', marginBottom: 'var(--space-md)' }}>
                                            <h3 style={{ fontSize: '1.1rem', fontWeight: 600, color: 'var(--color-success)' }}>Ready to Submit?</h3>
                                        </div>
                                        
                                        <div style={{ background: 'white', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', marginBottom: 'var(--space-md)' }}>
                                            <h4 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: 'var(--space-xs)' }}>{pendingActivity.title}</h4>
                                            <p style={{ fontSize: '0.85rem', color: 'var(--color-text-light)', marginBottom: 'var(--space-sm)' }}>📍 {pendingActivity.city}</p>
                                            <p style={{ fontSize: '0.9rem', marginBottom: 'var(--space-md)', lineHeight: 1.5 }}>{pendingActivity.description}</p>
                                            
                                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 'var(--space-md)', fontSize: '0.85rem', color: 'var(--color-text-light)' }}>
                                                <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                    <Icon name="DollarSign" size={14} /> €{pendingActivity.estimatedCost} (~${(pendingActivity.estimatedCost * CONFIG.softParams.eurToUsdRate).toFixed(0)})
                                                </span>
                                                <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                    <Icon name="Clock" size={14} /> {pendingActivity.duration}
                                                </span>
                                                <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                    <Icon name="MapPin" size={14} /> {pendingActivity.travelMethod} ({pendingActivity.travelTime})
                                                </span>
                                            </div>
                                            
                                            {pendingActivity.otherConsiderations && (
                                                <p style={{ fontSize: '0.85rem', color: 'var(--color-text-light)', marginTop: 'var(--space-sm)', fontStyle: 'italic' }}>
                                                    💡 {pendingActivity.otherConsiderations}
                                                </p>
                                            )}
                                            {pendingActivity.conflictNote && (
                                                <div style={{ marginTop: 'var(--space-sm)', padding: 'var(--space-sm) var(--space-md)', background: '#FFF3E0', border: '1px solid #FFB74D', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'flex-start', gap: '6px' }}>
                                                    <span style={{ fontSize: '1rem', flexShrink: 0 }}>⚠️</span>
                                                    <p style={{ fontSize: '0.85rem', color: '#E65100', margin: 0, lineHeight: 1.4 }}>{pendingActivity.conflictNote}</p>
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                                            <button 
                                                onClick={handleConfirmActivity}
                                                style={{ 
                                                    flex: 1, 
                                                    padding: 'var(--space-md)', 
                                                    background: 'var(--color-success)', 
                                                    color: 'white', 
                                                    border: 'none', 
                                                    borderRadius: 'var(--radius-md)', 
                                                    cursor: 'pointer', 
                                                    fontSize: '1rem', 
                                                    fontWeight: 600,
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    gap: 'var(--space-sm)'
                                                }}
                                            >
                                                <Icon name="Send" size={18} /> Submit for Review
                                            </button>
                                            <button 
                                                onClick={handleKeepPlanning}
                                                style={{ 
                                                    flex: 1, 
                                                    padding: 'var(--space-md)', 
                                                    background: 'white', 
                                                    color: 'var(--color-text)', 
                                                    border: '1px solid var(--color-border)', 
                                                    borderRadius: 'var(--radius-md)', 
                                                    cursor: 'pointer', 
                                                    fontSize: '1rem', 
                                                    fontWeight: 500,
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    gap: 'var(--space-sm)'
                                                }}
                                            >
                                                Keep Planning
                                            </button>
                                        </div>
                                    </div>
                                )}
                                
                                <div ref={messagesEndRef} />
                            </div>
                            
                            <div style={{ padding: 'var(--space-md)', paddingBottom: 'calc(var(--space-md) + env(safe-area-inset-bottom, 0px))', background: 'white', borderTop: '1px solid var(--color-border)' }}>
                                <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                                    <textarea value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyPress={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }} placeholder="Tell me what you're thinking..." rows={1} style={{ flex: 1, padding: 'var(--space-md)', border: '2px solid var(--color-border)', borderRadius: 'var(--radius-lg)', fontSize: '1rem', fontFamily: 'var(--font-body)', resize: 'none', outline: 'none', minHeight: '48px', maxHeight: '120px' }} onFocus={(e) => e.target.style.borderColor = user.color} onBlur={(e) => e.target.style.borderColor = 'var(--color-border)'} disabled={!!pendingActivity} />
                                    <button onClick={sendMessage} disabled={!inputValue.trim() || isLoading || !!pendingActivity} style={{ width: '48px', height: '48px', borderRadius: 'var(--radius-full)', border: 'none', background: inputValue.trim() && !pendingActivity ? user.color : 'var(--color-tan)', color: inputValue.trim() ? 'white' : 'var(--color-text-light)', cursor: inputValue.trim() && !isLoading && !pendingActivity ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <Icon name="Send" size={20} />
                                    </button>
                                </div>
                                {/* Chat prompt chips — scrolls horizontally on mobile */}
                                <div style={{ display: 'flex', gap: 'var(--space-sm)', marginTop: 'var(--space-sm)', overflowX: 'auto', paddingBottom: '2px' }}>
                                    {(user.isParent ? [
                                        { label: 'Family Status', icon: 'Users', prompt: 'Give me a full family status update — what activities have been submitted and approved for each kid, who still needs more, budget remaining, and what needs my attention.' },
                                        { label: "What's the Plan", icon: 'Calendar', prompt: "Walk me through the full trip plan — cities, dates, transfer days, and anything notable we need to prepare for." },
                                        { label: 'All Activities', icon: 'List', prompt: 'Show me all submitted and approved activities across the whole family.' },
                                        { label: 'Trip Logistics', icon: 'Map', prompt: 'Help me think through the logistics of this trip — trains between cities, what needs booking in advance, transfer day plans, and anything I might be missing.' },
                                        { label: 'Booking List', icon: 'Book', prompt: 'What things do we still need to book or reserve for this trip? Check what has already been flagged and suggest anything else I should be thinking about.' },
                                        { label: "What's the Story", icon: 'BookOpen', prompt: "Tell me the story of our trip so far — what are we doing, what's been proposed, what are we most excited about? Give it to me as a fun narrative, not a list." }
                                    ] : [
                                        { label: 'Give me Ideas', icon: 'Sparkles', prompt: 'Give me some activity ideas for this trip based on my interests!' },
                                        { label: "What's the Plan", icon: 'Calendar', prompt: "What's the full trip plan? Walk me through the cities, transfer days, and dates." },
                                        { label: 'My Activities', icon: 'List', prompt: 'Show me all the activities I have submitted or that have been approved so far.' },
                                        { label: 'All Activities', icon: 'Users', prompt: 'Show me all approved activities for the whole family so I can see what everyone is doing and avoid conflicts.' },
                                        { label: "What's the Story", icon: 'BookOpen', prompt: "Tell me the story of our trip so far — what are we doing, what's been proposed, what are we most excited about? Give it to me as a fun narrative, not a list." },
                                        { label: 'Trip Logistics', icon: 'Map', prompt: 'Help me think through how we get between cities — trains, travel times, what to book in advance.' }
                                    ]).map(({ label, icon, prompt }, i) => (
                                        <button key={i} onClick={() => { sendMessage(prompt); }} disabled={!!pendingActivity || isLoading} style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: 'var(--space-sm) var(--space-md)', background: 'var(--color-cream)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-full)', fontSize: '0.85rem', whiteSpace: 'nowrap', cursor: (pendingActivity || isLoading) ? 'not-allowed' : 'pointer', opacity: (pendingActivity || isLoading) ? 0.5 : 1 }}>
                                            <Icon name={icon} size={14} /> {label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        };
        
        // Activity Card
        const ActivityCard = ({ activity, isAdmin, onApprove, onFeedback }) => {
            const statusColors = { draft: { bg: 'var(--color-tan)', color: 'var(--color-text-light)' }, submitted: { bg: '#FFF3E0', color: 'var(--color-warning)' }, approved: { bg: '#E8F5E9', color: 'var(--color-success)' }, 'needs-revision': { bg: '#FFF3E0', color: 'var(--color-warning)' }, rejected: { bg: '#FFEBEE', color: 'var(--color-error)' } };
            const status = statusColors[activity.status] || statusColors.draft;
            const costUSD = (activity.estimatedCost * CONFIG.softParams.eurToUsdRate).toFixed(0);
            
            return (
                <div style={{ background: 'white', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--color-border)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 'var(--space-sm)' }}>
                        <div>
                            <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '4px' }}>{activity.title}</h3>
                            <div style={{ fontSize: '0.85rem', color: 'var(--color-text-light)' }}>{activity.kidName} • {activity.city}</div>
                        </div>
                        <span style={{ padding: '4px 10px', borderRadius: 'var(--radius-full)', fontSize: '0.75rem', fontWeight: 500, background: status.bg, color: status.color }}>{activity.status.replace('-', ' ')}</span>
                    </div>
                    <p style={{ fontSize: '0.9rem', marginBottom: 'var(--space-md)', lineHeight: 1.5 }}>{activity.description}</p>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 'var(--space-md)', fontSize: '0.85rem', color: 'var(--color-text-light)', marginBottom: 'var(--space-md)' }}>
                        <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}><Icon name="DollarSign" size={14} /> €{activity.estimatedCost} (~${costUSD})</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}><Icon name="Clock" size={14} /> {activity.duration}</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}><Icon name="MapPin" size={14} /> {activity.travelTime}</span>
                    </div>
                    {activity.parentFeedback && <div style={{ background: '#FFF3E0', padding: 'var(--space-sm) var(--space-md)', borderRadius: 'var(--radius-sm)', fontSize: '0.85rem', marginBottom: 'var(--space-md)' }}><strong>Feedback:</strong> {activity.parentFeedback}</div>}
                    {isAdmin && activity.status === 'submitted' && (
                        <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                            <button onClick={() => onApprove(activity.id)} style={{ flex: 1, padding: 'var(--space-sm) var(--space-md)', background: 'var(--color-success)', color: 'white', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', fontWeight: 500 }}><Icon name="Check" size={16} /> Approve</button>
                            <button onClick={() => onFeedback(activity.id)} style={{ flex: 1, padding: 'var(--space-sm) var(--space-md)', background: 'var(--color-warning)', color: 'white', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontWeight: 500 }}>Feedback</button>
                        </div>
                    )}
                    {activity.conflictNote && (
                        <div style={{ marginTop: 'var(--space-sm)', padding: 'var(--space-sm) var(--space-md)', background: '#FFF3E0', border: '1px solid #FFB74D', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'flex-start', gap: '6px' }}>
                            <span style={{ fontSize: '0.9rem', flexShrink: 0 }}>⚠️</span>
                            <p style={{ fontSize: '0.8rem', color: '#E65100', margin: 0, lineHeight: 1.4 }}>{activity.conflictNote}</p>
                        </div>
                    )}
                    {activity.isSample && <div style={{ fontSize: '0.75rem', color: 'var(--color-text-light)', fontStyle: 'italic', marginTop: 'var(--space-sm)', textAlign: 'center' }}>📝 Sample activity</div>}
                </div>
            );
        };
        
        // Idea Card Component
        const IdeaCard = ({ idea, isOwner, onRefine, onSubmit, onDelete, userProfiles }) => {
            const user = userProfiles[idea.kidId];
            const costUSD = idea.estimatedCost ? (idea.estimatedCost * CONFIG.softParams.eurToUsdRate).toFixed(0) : '?';
            
            return (
                <div style={{ background: 'white', borderRadius: 'var(--radius-md)', padding: 'var(--space-md)', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--color-border)', borderLeft: `4px solid ${user?.color || 'var(--color-gold)'}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 'var(--space-sm)' }}>
                        <div>
                            <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '4px' }}>{idea.title}</h3>
                            <div style={{ fontSize: '0.8rem', color: 'var(--color-text-light)' }}>
                                {user?.emoji} {idea.kidName} • {idea.city}
                            </div>
                        </div>
                        {idea.estimatedCost > 0 && (
                            <span style={{ fontSize: '0.85rem', fontWeight: 500, color: 'var(--color-sage)' }}>~€{idea.estimatedCost}</span>
                        )}
                    </div>
                    {idea.notes && (
                        <p style={{ fontSize: '0.85rem', color: 'var(--color-text-light)', marginBottom: 'var(--space-md)', lineHeight: 1.4 }}>{idea.notes}</p>
                    )}
                    {isOwner && (
                        <div style={{ display: 'flex', gap: 'var(--space-sm)' }}>
                            <button onClick={() => onRefine(idea)} style={{ flex: 1, padding: '8px 12px', background: 'var(--color-cream)', color: 'var(--color-text)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontSize: '0.85rem', fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '4px' }}>
                                ✏️ Refine
                            </button>
                            <button onClick={() => onSubmit(idea.id)} style={{ flex: 1, padding: '8px 12px', background: 'var(--color-sage)', color: 'white', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontSize: '0.85rem', fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '4px' }}>
                                <Icon name="Send" size={14} /> Submit
                            </button>
                            <button onClick={() => onDelete(idea.id)} style={{ padding: '8px', background: 'none', color: 'var(--color-text-light)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                <Icon name="X" size={14} />
                            </button>
                        </div>
                    )}
                </div>
            );
        };
        
        // Dashboard
        const DashboardScreen = ({ onBack, activities, savedIdeas, bookingItems, userProfiles, isAdmin, currentUserId, onApprove, onFeedback, onRefineIdea, onSubmitIdea, onDeleteIdea, onToggleBooked, onDeleteBooking }) => {
            const [filter, setFilter] = useState('all');
            const [activeTab, setActiveTab] = useState('ideas');
            
            const filtered = useMemo(() => {
                if (filter === 'abby') return activities.filter(a => a.kidId === 'abby');
                if (filter === 'tyler') return activities.filter(a => a.kidId === 'tyler');
                if (filter === 'pending') return activities.filter(a => a.status === 'submitted');
                return activities;
            }, [activities, filter]);
            
            const abbyIdeas = savedIdeas.filter(i => i.kidId === 'abby');
            const tylerIdeas = savedIdeas.filter(i => i.kidId === 'tyler');
            
            const handleResetCache = () => {
                if (confirm('This will clear all cached data and reload from Google Sheets. Continue?')) {
                    localStorage.removeItem('euroPlanner_activities');
                    localStorage.removeItem('euroPlanner_savedIdeas');
                    localStorage.removeItem('euroPlanner_conversations');
                    localStorage.removeItem('euroPlanner_sessionSummaries');
                    localStorage.removeItem('euroPlanner_lastActivity');
                    localStorage.removeItem('euroPlanner_profiles');
                    window.location.reload();
                }
            };
            
            return (
                <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--color-cream)' }}>
                    <header style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-sm)', padding: 'var(--space-md)', paddingTop: 'calc(var(--space-md) + env(safe-area-inset-top, 0px))', background: 'white', borderBottom: '1px solid var(--color-border)' }}>
                        <button onClick={onBack} style={{ background: 'var(--color-cream)', border: '1px solid var(--color-border)', padding: '8px', cursor: 'pointer', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '40px', minHeight: '40px' }}><Icon name="ArrowLeft" size={20} /></button>
                        <h1 style={{ flex: 1, fontSize: '1.25rem', fontWeight: 600 }}>Planning Hub</h1>
                        {isAdmin && <span style={{ background: 'var(--color-sage)', color: 'white', padding: '4px 10px', borderRadius: 'var(--radius-full)', fontSize: '0.75rem', fontWeight: 500 }}>Admin</span>}
                    </header>
                    
                    {/* Tab switcher */}
                    <div style={{ display: 'flex', background: 'white', borderBottom: '1px solid var(--color-border)' }}>
                        <button onClick={() => setActiveTab('ideas')} style={{ flex: 1, padding: 'var(--space-md)', background: activeTab === 'ideas' ? 'var(--color-cream)' : 'white', border: 'none', borderBottom: activeTab === 'ideas' ? '3px solid var(--color-gold)' : '3px solid transparent', cursor: 'pointer', fontSize: '0.9rem', fontWeight: activeTab === 'ideas' ? 600 : 400, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px' }}>
                            💡 Ideas ({savedIdeas.length})
                        </button>
                        <button onClick={() => setActiveTab('activities')} style={{ flex: 1, padding: 'var(--space-md)', background: activeTab === 'activities' ? 'var(--color-cream)' : 'white', border: 'none', borderBottom: activeTab === 'activities' ? '3px solid var(--color-sage)' : '3px solid transparent', cursor: 'pointer', fontSize: '0.9rem', fontWeight: activeTab === 'activities' ? 600 : 400, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px' }}>
                            ✅ Submitted ({activities.filter(a => !a.isSample).length})
                        </button>
                        {isAdmin && (
                            <button onClick={() => setActiveTab('bookings')} style={{ flex: 1, padding: 'var(--space-md)', background: activeTab === 'bookings' ? 'var(--color-cream)' : 'white', border: 'none', borderBottom: activeTab === 'bookings' ? '3px solid var(--color-terracotta)' : '3px solid transparent', cursor: 'pointer', fontSize: '0.9rem', fontWeight: activeTab === 'bookings' ? 600 : 400, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px' }}>
                                🎟️ Book ({bookingItems.length})
                            </button>
                        )}
                    </div>
                    
                    {/* Budget summary */}
                    <div style={{ display: 'flex', gap: 'var(--space-md)', padding: 'var(--space-md)', background: 'white', borderBottom: '1px solid var(--color-border)' }}>
                        {Object.entries(userProfiles).map(([key, user]) => (
                            <div key={key} style={{ flex: 1, padding: 'var(--space-md)', background: 'var(--color-cream)', borderRadius: 'var(--radius-md)', textAlign: 'center' }}>
                                <div style={{ fontSize: '1.5rem' }}>{user.emoji}</div>
                                <div style={{ fontWeight: 600 }}>{user.name}</div>
                                <div style={{ fontSize: '0.85rem', color: 'var(--color-text-light)' }}>${user.budgetRemaining?.toFixed(0)} left</div>
                                <div style={{ fontSize: '0.8rem', color: user.color, fontWeight: 500 }}>{activities.filter(a => a.kidId === key && a.status === 'approved' && !a.isSample).length}/3 approved</div>
                            </div>
                        ))}
                    </div>
                    
                    {/* Ideas Tab */}
                    {activeTab === 'ideas' && (
                        <div style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-md)' }}>
                            {savedIdeas.length === 0 ? (
                                <div style={{ textAlign: 'center', padding: 'var(--space-2xl)', color: 'var(--color-text-light)' }}>
                                    <div style={{ fontSize: '48px', marginBottom: 'var(--space-md)' }}>💡</div>
                                    <p style={{ marginTop: 'var(--space-md)' }}>No saved ideas yet!</p>
                                    <p style={{ fontSize: '0.85rem' }}>Chat with the assistant and say "save that idea" to bookmark things for later.</p>
                                </div>
                            ) : (
                                <>
                                    {abbyIdeas.length > 0 && (
                                        <div style={{ marginBottom: 'var(--space-lg)' }}>
                                            <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: 'var(--space-sm)', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                <span style={{ fontSize: '1.25rem' }}>⚽</span> Abby's Ideas ({abbyIdeas.length})
                                            </h3>
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-sm)' }}>
                                                {abbyIdeas.map(idea => (
                                                    <IdeaCard 
                                                        key={idea.id} 
                                                        idea={idea} 
                                                        isOwner={currentUserId === 'abby' || isAdmin}
                                                        onRefine={onRefineIdea}
                                                        onSubmit={onSubmitIdea}
                                                        onDelete={onDeleteIdea}
                                                        userProfiles={userProfiles}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {tylerIdeas.length > 0 && (
                                        <div style={{ marginBottom: 'var(--space-lg)' }}>
                                            <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: 'var(--space-sm)', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                <span style={{ fontSize: '1.25rem' }}>🏈</span> Tyler's Ideas ({tylerIdeas.length})
                                            </h3>
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-sm)' }}>
                                                {tylerIdeas.map(idea => (
                                                    <IdeaCard 
                                                        key={idea.id} 
                                                        idea={idea} 
                                                        isOwner={currentUserId === 'tyler' || isAdmin}
                                                        onRefine={onRefineIdea}
                                                        onSubmit={onSubmitIdea}
                                                        onDelete={onDeleteIdea}
                                                        userProfiles={userProfiles}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    )}
                    
                    {/* Activities Tab */}
                    {activeTab === 'activities' && (
                        <>
                            <div style={{ display: 'flex', gap: 'var(--space-sm)', padding: 'var(--space-md)', overflowX: 'auto' }}>
                                {[{ key: 'all', label: 'All' }, { key: 'pending', label: 'Pending' }, { key: 'abby', label: "Abby's" }, { key: 'tyler', label: "Tyler's" }].map(f => (
                                    <button key={f.key} onClick={() => setFilter(f.key)} style={{ padding: 'var(--space-sm) var(--space-md)', background: filter === f.key ? 'var(--color-navy)' : 'white', color: filter === f.key ? 'white' : 'var(--color-text)', border: '1px solid var(--color-border)', borderRadius: 'var(--radius-full)', cursor: 'pointer', fontSize: '0.85rem', fontWeight: 500, whiteSpace: 'nowrap' }}>{f.label}</button>
                                ))}
                            </div>
                            
                            <div style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-md)', display: 'flex', flexDirection: 'column', gap: 'var(--space-md)' }}>
                                {filtered.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: 'var(--space-2xl)', color: 'var(--color-text-light)' }}>
                                        <Icon name="List" size={48} color="var(--color-border)" />
                                        <p style={{ marginTop: 'var(--space-md)' }}>No activities yet!</p>
                                    </div>
                                ) : filtered.map(a => <ActivityCard key={a.id} activity={a} isAdmin={isAdmin} onApprove={onApprove} onFeedback={onFeedback} />)}
                            </div>
                        </>
                    )}
                    
                    {/* Booking List Tab — admin only */}
                    {activeTab === 'bookings' && isAdmin && (
                        <div style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-md)' }}>
                            {bookingItems.length === 0 ? (
                                <div style={{ textAlign: 'center', padding: 'var(--space-2xl)', color: 'var(--color-text-light)' }}>
                                    <div style={{ fontSize: '48px', marginBottom: 'var(--space-md)' }}>🎟️</div>
                                    <p style={{ fontWeight: 600, marginBottom: 'var(--space-sm)' }}>No bookings yet</p>
                                    <p style={{ fontSize: '0.85rem' }}>Chat with Claude about activities that need advance booking — trains, tickets, tours, restaurants — and they'll appear here automatically.</p>
                                </div>
                            ) : (
                                <>
                                    {/* To Book section */}
                                    {bookingItems.filter(b => b.status !== 'booked').length > 0 && (
                                        <div style={{ marginBottom: 'var(--space-lg)' }}>
